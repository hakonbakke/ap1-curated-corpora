key_claims:
  - "Climate change and predation are identified as the largest current threats to English Atlantic salmon stocks and are projected to expand over the next decade."
  - "Poor water quality and bycatch are classified as high-impact but stabilised stressors for English stocks."
  - "Salmon mariculture (including sea lice) is classified as a relatively low-impact stressor for English stocks, due to limited salmon farm proximity to English rivers."
  - "The 2D classification framework (Forseth et al. 2017) applied to English stocks produces substantially different threat rankings than the Norwegian context, illustrating strong geographic dependency of threat prioritisation."
  - "Marine survival has declined markedly (<5% of smolts now survive to return as adults), with the causes poorly understood."

claims_about_uncertainty:
  - "The relative importance of different marine stressors on survival remains poorly understood, as mortality is difficult to directly observe at sea."
  - "Cumulative and interactive effects of multiple stressors are not well quantified."

claims_about_policy_or_management:
  - "Local management actions directed toward improving freshwater and estuarine habitats to maximise ecosystem resilience are recommended."
  - "Future research should prioritise climate change, predation, renewable energy impacts, and artificial light at night."

methodological_limitations:
  - "The classification system applies to English stocks specifically; direct comparisons with Norwegian or Canadian rankings require caution."
  - "Quantitative data on several marine stressors (especially predation, artificial light) are limited; classifications involve expert judgment."

rag_summary: >
  Gillson et al. (2022) present a comprehensive review of marine stressors affecting Atlantic salmon and apply the semi-quantitative 2D threat classification system (developed by Forseth et al. 2017 for Norway) to English salmon stocks. For English rivers, climate change and predation emerge as the dominant expanding threats, while salmon mariculture is classified as low-impact due to limited farm proximity. This contrasts with Norway, where lice from farms and escaped salmon are ranked as the top expanding population threats. The paper demonstrates that the relative importance of aquaculture-related lice impacts is highly context-dependent, varying substantially with local aquaculture density and geography.

