key_claims:
  - "Climate change and predation are the dominant expanding high-impact marine stressors for English Atlantic salmon (42 principal rivers, 4 regional marine plan areas, 2018 classification)"
  - "Poor water quality and bycatch are high-impact but stabilised (mitigation available); salmon fisheries exploitation is no longer important due to exploitation controls (no commercial take since 2019)"
  - "Salmon mariculture (sea lice, escapes) is a stabilised LOW-impact stressor for England — near-absence of farms in English nearshore waters; contrasts with Norway where lice/escapes rank as top expanding threats (Forseth et al. 2017)"
  - "Global farmed salmon ~1.5 million t in 2018 (Norway 81%, Scotland 10%); England has negligible production — location-specific severity is the main lesson for TLS transferability"
  - "Post-smolt lice mortality can reduce adult returns 0.6–39% near farms (review cites Gargan, Krkošek, Skilbrei), but this pathway is ranked low for English stocks specifically"

claims_about_uncertainty:
  - "The relative importance of different marine stressors on survival remains poorly understood, as mortality is difficult to directly observe at sea."
  - "Cumulative and interactive effects of multiple stressors are not well quantified."

claims_about_policy_or_management:
  - "Local management actions directed toward improving freshwater and estuarine habitats to maximise ecosystem resilience are recommended."
  - "Future research should prioritise climate change, predation, renewable energy impacts, and artificial light at night."

methodological_limitations:
  - "The classification system applies to English stocks specifically; direct comparisons with Norwegian or Canadian rankings require caution."
  - "Quantitative data on several marine stressors (especially predation, artificial light) are limited; classifications involve expert judgment."

rag_summary: >
  Gillson et al. (2022, Rev Fish Biol Fisheries 32:879–919) review 13 marine stressors for Atlantic salmon and apply Forseth et al. (2017) 2D classification to 42 English rivers (4 marine plan areas, 2018). Expanding high impact: climate change, predation. Stabilised high: water quality, bycatch. Stabilised low: salmon mariculture (lice/escapes/genetic introgression) and fisheries — farms absent from English coast; Norway produces 81% of NE Atlantic farmed salmon. Review notes post-smolt lice can cut returns 0.6–39% where farms exist. Crown copyright; CEFAS/Environment Agency authors. Core corpus value: geographic context-dependence of farm-lice as population threat (Q9/Q10).

coi_declared: no

coi_notes: >
  Authors are from the Centre for Environment, Fisheries and Aquaculture Science (CEFAS) and Environment Agency (England). Published under Crown copyright (2022). No industry funding declared.


