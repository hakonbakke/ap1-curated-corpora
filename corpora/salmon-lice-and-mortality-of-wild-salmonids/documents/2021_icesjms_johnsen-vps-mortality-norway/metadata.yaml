curator_note: >
  Open access (CC BY 4.0). This is the official IMR VPS model paper cited in all Norwegian TLS regulatory reports. The 2019 results (179 rivers <10%, 140 rivers 10-30%, 82 rivers >30%) are the primary quantitative outputs widely cited in policy discussions. Jansen and Gjerde (2021) published a formal comment on this paper in the same journal volume; both papers should always be read together to understand the state of the science and the contested assumptions. The Kristoffersen et al. (2018) NVI model was developed in parallel and uses substantially different assumptions: shortest-path migration routing vs. hydrodynamic routing, and sentinel cage calibration vs. genetic assignment calibration.

