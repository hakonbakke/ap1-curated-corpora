key_claims:
  - "2019 mortality for 401 rivers: <10% = 179 rivers, 10-30% = 140, >30% = 82 (Figure 4; equal river weighting)"
  - "2019 MA means (river-weighted): high >30% in MA3-4; moderate 10-30% in MA2,5-7,10; low elsewhere"
  - "1000 VPS simulated per river; 40 d migration window (start 10 d before, end 30 d after 25% migration date)"
  - "Calibration: genetically assigned trawl post-smolts 2015-2019 (MA2-5); GLMM NB with river+year random effects; 446/2125 discarded (no matching VPS)"
  - "Infestation model: log(λ)=intercept + offset log(IP) + random effects; dispersion h≈0.3695; 60% lice survive to harmful mobile stages"
  - "Table 1 normal mortality (20 g, Taranger 2015): 0-1 lice 0%, 2-3 → 20%, 4-6 → 50%, >6 → 100%; low/high variants shift MA classifications (4/13 MAs reclassified 2019)"
  - "VPS fjord-index routing: 5× probability move toward ocean vs stay/up-fjord; median speed 0.14 m s⁻¹; Etne migration 6.7 d, Opo 17.6 d to ocean"
  - "Lice copepodids may drift >100 km; migration typically 3-7 weeks, majority within 1-2 weeks per river"
  - "Inner-fjord rivers consistently higher mortality than outer/coastal rivers within same MA"
  - "2012-2019 trend: fewer low-mortality rivers in MA2-6; MA3 only area with declining >30% river share since 2016 peak"

claims_about_uncertainty:
  - "Mortality more sensitive to tolerance limits than to ±10 d migration timing shifts (supplementary timing tests)"
  - "2019: lower tolerance raised MA2-6 mean mortality ~40%; higher tolerance lowered ~20%"

claims_about_policy_or_management:
  - "Norwegian TLS: green <10%, yellow 10-30%, red >30% → ±6% production volume; results used in government impact assessment"
  - "NALO trawling limited spatially; VPS enables all 401 rivers — model outputs on NMDC (Johnsen et al. 2020)"

methodological_limitations:
  - "Tolerance limits from Taranger 2015 laboratory/hatchery evidence"
  - "Migration timing for most rivers extrapolated from 25 reference rivers"
  - "Calibration concentrated in high-aquaculture MAs 2-5"
  - "Passive fjord-index migration; no avoidance behaviour"

rag_summary: >
  Johnsen et al. (2021, ICES JMS 78:142-154, open access IMR) present the Virtual Post-Smolt model for
  all 401 Norwegian salmon rivers using Sandvik et al. hydrodynamic lice fields, genetic-assignment
  trawl calibration (2015-2019), and Taranger mortality Table 1. 2019: 179/140/82 rivers in
  <10/10-30/>30% classes; MA3-4 highest. Inner fjords worst. Funded by Trade/Industry/Fisheries via IMR
  14650. Claim: modelled lice coincide with observed trawled fish — contested by Jansen & Gjerde 2021.

