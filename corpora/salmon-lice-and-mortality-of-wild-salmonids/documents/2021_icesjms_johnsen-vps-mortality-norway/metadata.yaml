# DEL D - SYNTESE OG PLASSERING I LITTERATUREN
consensus_signal: moderate_agreement

quality_signal: strong

quality_rationale: >
  Published in ICES Journal of Marine Science, a high-impact peer-reviewed fisheries journal. The model integrates state-of-the-art hydrodynamic modelling with genetic assignment of wild fish, representing a methodologically sophisticated approach. Calibrated against five years of empirical data (2015-2019). Direct regulatory use implies additional scrutiny beyond typical peer review. The key limitation - reliance on lice tolerance thresholds from Taranger et al. (2015) - is acknowledged and was subsequently critiqued by Jansen and Gjerde (2021), reflecting active scientific scrutiny of the core assumptions.

controversy_role: supports_effect

relevance_signal: high

relevance_rationale: >
  This is the primary IMR model paper underpinning Norway's Traffic Light System. It is foundational to the entire corpus: it directly addresses Q3-Q5, Q7-Q8, and Q10 and is the specific target of the Jansen and Gjerde (2021) critique already in the corpus. No evaluation of salmon lice mortality science in Norway is complete without this paper.

transferability: low

transferability_notes: >
  Highly Norway-specific: calibrated against Norwegian farm reporting data, NALO trawling surveys, Norwegian river genetics, and Norwegian coastal hydrodynamics. The VPS framework concept is transferable but all parameter values and validation data are Norwegian. Limited direct applicability to other salmon-farming regions without full re-parameterisation.

# DEL E - RELASJONER OG KURATORKOMMENTARER
included_because: >
  Foundational paper presenting the IMR VPS model that is one of the primary models used by the Norwegian Traffic Light System to assess lice-induced mortality of wild post-smolts. Directly addresses how salmon lice from aquaculture causes mortality in migrating post-smolts at the population scale across all of Norway. The paper is the specific focus of a critique already in the corpus (Jansen and Gjerde 2021).

