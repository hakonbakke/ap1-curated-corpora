rag_summary: >
  Johnsen et al. (2021) present the Institute of Marine Research (IMR) Virtual Post-Smolt (VPS) model, the core analytical tool underpinning Norway's Traffic Light System (TLS) for aquaculture regulation. The model estimates salmon lice-induced mortality of wild Atlantic salmon post-smolts from 401 Norwegian rivers by combining a hydrodynamic lice larval dispersal archive with empirical post-smolt migration parameters, and is calibrated by comparing predicted infestation against observed lice loads on wild post-smolts genetically assigned to their rivers of origin via the national NALO trawling programme (2015-2019). For 2019, the model estimated mortality less than 10% for 179 rivers, 10-30% for 140 rivers, and greater than 30% for 82 rivers, directly informing the green/yellow/red TLS classifications that determine whether aquaculture production in each zone may expand, remain stable, or must decrease. Key limitations include reliance on experimental lice tolerance thresholds from Taranger et al. (2015), migration timing parameters extrapolated from 25 to 401 rivers, and incomplete genetic resolution of all river populations; the model was formally critiqued by Jansen and Gjerde (2021) in the same journal.

