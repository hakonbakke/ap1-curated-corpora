rag_summary: >
  Comment by the TLS Expert Group responding to Van Nes et al. (2024) critical review. Key
  counter-arguments: model calibration compensates for larvae overestimation; Van Nes et al.
  selectively highlights overestimation while ignoring underestimation factors (trawl captures
  only partial migration, sentinel cages underestimate by order of magnitude); mortality
  thresholds should be lower than claimed; and relevant conflicts of interest were not disclosed.
  Authored by 9 current EG members from NVI, IMR, NORCE, NINA, SINTEF, and UiB.
