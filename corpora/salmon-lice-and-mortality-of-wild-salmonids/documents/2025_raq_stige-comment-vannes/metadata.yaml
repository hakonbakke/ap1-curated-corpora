key_claims:
  - "Van Nes et al. (raq.12953) welcomed for highlighting uncertainties but argued biased toward low-impact evidence"
  - "Migration timing: five acoustic-telemetry river-years insufficient vs 343+ river-years in Vollset et al. (2021) model; EG does not assume 28-day coastal residence — VPS models use swimming speeds implying shorter residence for most rivers"
  - "Farm larvae 'overestimation' unlikely to bias mortality because models calibrate calculated infestation pressure to observed smolt lice counts (scaling factor absorbs systematic error)"
  - "Underestimation factors omitted in review: trawl index covers only inner fjord segment; sentinel cages underestimate ~10× vs trawl (Stige et al. 2022); assessment is expert elicitation not mean of seven indices"
  - "Sea trout–salmon correlation misrepresented: Vollset et al. (2017) r=0.71 for trout index vs log salmon abundance — not 'poor correlation'"
  - "Allee effect critique rebutted: female sperm storage, male host-switching, farm spread models show Allee only at impractically low densities (Aldrin et al. 2017, 2023)"
  - "Salinity inclusion in Stige et al. (2021) increased not decreased prediction uncertainty; temperature infectivity included in both NVI and IMR VPS models"
  - "Mortality thresholds: Grimnes & Jakobsen (1996) could not test adult-stage tolerance; Holst et al. field data suggest threshold <10 mobile lice; Fjelldal et al. moribund fish below experimental lethal dose"
  - "Release experiments: Vollset et al. (2023) lice resistance to emamectin benzoate not mentioned; Slice toxicity in treated groups (Lennox et al. 2020) could underestimate lice mortality"
  - "COI disclosure: Van Nes et al. omitted Salmon Tracking 2030 industry funding (PO3–4) and first author Nova Sea board role"
claims_about_uncertainty:
  - "Post-attachment lice loss 0–80% in experiments with unknown field relevance; 40% correction ≈ chalimus→pre-adult transition; handling loss before counts biases opposite direction"
  - "Multiple VPS models with differing assumptions reflect parametric uncertainty (climate-model analogy)"
claims_about_policy_or_management:
  - "TLS mandate unchanged: assess lice-induced mortality of out-migrating post-smolts per production area for biennial capacity decisions"
  - "Sea trout lice indicate susceptibility of smolts in area but cannot directly estimate smolt mortality (EG's own wording, cited in review)"
methodological_limitations:
  - "Letter + appendix format — not new primary data"
  - "All nine authors are current TLS Expert Group members with court-case expert-witness history (2021–2022)"
rag_summary: >
  Stige et al. (2025, Rev Aquacult e70040) — nine current TLS Expert Group authors — rebut Van Nes et al.
  (2024) critical review. Core arguments: calibration neutralises farm-larvae bias; review ignores
  underestimation pathways; misstates migration model inputs and trout–salmon correlation (r=0.71);
  mortality thresholds lower than review claims; challenges Van Nes COI transparency (Salmon Tracking
  2030, Nova Sea). Appendix covers trawl timing, sentinel cages, salinity modelling, Allee effect,
  post-attachment loss and release-study interpretation.
coi_declared: yes
coi_notes: >
  Authors are current EG members. Vollset: VRL and 2021–2022 TLS court expert witness. Karlsen: NALO
  surveillance lead. Vollset, Karlsen, Nilsen, Qviller: expert witnesses TLS court case. Funded by
  NVI, IMR, NINA.
