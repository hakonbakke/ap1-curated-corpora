# DEL D - SYNTESE OG PLASSERING I LITTERATUREN
consensus_signal: moderate_agreement
quality_signal: moderate
quality_rationale: >
  Well-designed controlled laboratory experiment with PIT-tagged individually tracked fish, rigorous plasma
  biochemistry, and dose-response analysis. Quality is limited by single infection dose (not a multi-dose
  titration), small within-group sample sizes for some analyses, and the inherent gap between laboratory
  and field conditions. The ~40 g size class and F1 wild origin fish are appropriate but introduce
  uncertainty about generalizability to naturally sized smolts.

controversy_role: supports_effect

relevance_signal: high
relevance_rationale: >
  Provides the only available dataset with explicit lice-per-gram threshold values for osmoregulatory
  impairment and mortality onset in Atlantic salmon post-smolts, filling a key mechanistic gap (Q6)
  and informing threshold parameterization for mortality models (Q7).

transferability: medium
transferability_notes: >
  Laboratory thresholds established under controlled conditions at 9 degrees C and 34 ppt. Field conditions
  will differ in temperature, salinity, background stress and food availability. Values should be treated
  as indicative lower bounds rather than definitive field thresholds.

# DEL E - RELASJONER OG KURATORKOMMENTARER
included_because: >
  This paper provides unique physiological dose-response data quantifying the lice intensity thresholds
  at which Atlantic salmon post-smolts experience osmoregulatory failure, reduced growth and mortality
  onset. This fills a critical mechanistic gap (Q6) and provides laboratory-derived threshold values
  relevant to the parameterization of mortality models in the TLS framework (Q7).

