rag_summary: >
  Fjelldal et al. (2020) infect ~40 g F1 Atlantic salmon post-smolts (River Etne) with L. salmonis copepodids at IMR Matre (9°C, 34 ppt). After 28 days, infected fish average 0.38 mobile lice g⁻¹, grow half as fast (SGR 0.42 vs 0.95% day⁻¹), and show elevated Na⁺, Cl⁻, osmolality and cortisol versus controls. Regression thresholds for ion disruption are 0.18 (Cl⁻) and 0.22 (Na⁺) lice g⁻¹; moribund fish appear >0.2 lice g⁻¹. Total infected mortality/moribundity ~30% vs 13% controls (partly Vibrio in controls). Results support Norwegian lice risk-index and TLS intensity assumptions for small post-smolts. Open Access CC BY 4.0; IMR internal project 14650-05.

