rag_summary: >
  Fjelldal et al. (2020) conducted a controlled laboratory challenge in which ~40 g F1 wild-origin Atlantic
  salmon post-smolts (River Etne broodstock, n=330) were infected with Lepeophtheirus salmonis copepodids
  or left as uninfected controls. At 28 days post-infection, infected fish had a mean of 0.38 mobile lice
  per gram fish weight (range 0.07-0.9). Infected fish had specific growth rates of 0.4% day-1 versus 1.0%
  day-1 in controls, and elevated plasma Na+, Cl- and osmolality indicating osmoregulatory failure. Threshold
  values for osmoregulatory response were 0.18 lice g-1 (Cl-) and 0.22 lice g-1 (Na+); moribund fish
  occurred above 0.2 lice g-1. These data provide physiological dose-response values relevant to lice
  intensity thresholds used in Norwegian TLS risk assessments. Key limitation: laboratory conditions
  and outbred lice strain may not replicate field virulence and multi-stressor exposure.

