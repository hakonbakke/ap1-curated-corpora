# DEL C — FUNN OG BEVIS
# [CLAUDE]
# ======================================================================

evidence_direction: weak_support
# The review concludes farm lice negatively impact wild salmonids,
# but explicitly qualifies the extent as debated and the effect
# as "moderate". Not a strong causal claim.

effect_scale: both

uncertainty_emphasis: moderate

main_uncertainty_sources:
  - observational_bias
  - sampling_representativeness
  - transferability
  # The review acknowledges correlation ≠ causation and that data gaps
  # have led to over-interpretation in parts of the literature.

key_claims:
  - "Treated Atlantic salmon smolts showed an odds ratio of 1.1:1–1.2:1 for surviving sea migration compared to untreated smolts (Ireland and Norway data), characterised as a 'moderate population regulatory effect'."
  - "Farm-origin salmon lice negatively impact wild salmonid stocks, but the extent of the impact is explicitly described as a matter of ongoing debate."
  - "Intensive salmon aquaculture creates year-round high host density that amplifies lice reproduction and shedding of larvae into coastal waters beyond what natural wild populations would sustain."

claims_about_uncertainty:
  - "The review acknowledges that correlation between aquaculture expansion and wild salmon decline does not imply causation, and that lack of good data has led to over-interpretation in parts of the literature."

claims_about_policy_or_management:
  - "Regulatory management of lice levels is necessary, but thresholds and enforcement vary considerably across jurisdictions."
  - "Resistance to chemical treatments is growing and poses a challenge to lice management across all regions reviewed."

methodological_limitations:
  - "Narrative review without systematic search protocol — susceptible to selective citation."
  - "Synthesises studies with different designs, species, and geographies without formal meta-analysis."

rag_summary: >
  Torrissen et al. (2013) is a broad multi-national review of salmon lice
  biology, epidemiology, impact on wild salmonids, treatment strategies, and
  socioeconomic consequences, published in Journal of Fish Diseases. It covers
  the full causal chain from farm lice production to population-level effects
  on wild salmon and sea trout across Norway, Ireland, Scotland, and Canada.
  The review concludes that farm-origin lice negatively affect wild salmonids
  but characterises the impact as moderate (odds ratio 1.1:1–1.2:1 for smolt
  survival) and explicitly acknowledges that the extent of impact is debated.
  Resistance to chemical treatments is highlighted as a growing concern.
  A key limitation is that as a narrative review it does not apply a systematic
  search protocol, making it susceptible to selective citation.

coi_declared: unclear
coi_notes: >
  Several authors are affiliated with research institutions with close ties
  to aquaculture governance (IMR Norway, Marine Institute Ireland, DFO Canada).
  Frank Asche is affiliated with University of Stavanger, which leads the
  Havbruksløftet project. No formal conflict-of-interest declaration was
  found in the sections reviewed. Verify in the published version.


