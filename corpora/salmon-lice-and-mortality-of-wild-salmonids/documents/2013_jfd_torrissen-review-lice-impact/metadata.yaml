included_because: >
  Widely cited foundational review that synthesises knowledge across the full
  causal chain from farm lice to wild salmonid population effects, covering
  multiple countries and the main contested questions. Provides the biological
  and epidemiological baseline against which more recent empirical and modelling
  studies should be interpreted. The explicit odds ratio for smolt survival (1.1:1–1.2:1)
  is one of the most frequently cited effect-size estimates in Norwegian and
  international regulatory discussions. Its explicit acknowledgement of ongoing
  debate makes it a useful anchor for the full corpus — neither dismissing nor
  overstating the effect.

