evidence_direction: supports_effect

effect_scale: individual_level

uncertainty_emphasis: low

main_uncertainty_sources:
  - sampling_representativeness
  - transferability

key_claims:
  - "At week 1 post-infection, significantly more lice were recorded on sea trout than Atlantic salmon, regardless of whether fish were in single-species or mixed-species tanks."
  - "By week 8, Atlantic salmon had significantly fewer surviving lice than sea trout, indicating greater long-term immune clearance in salmon."
  - "The survival of pre-adult and adult lice declined more rapidly on sea trout in the early weeks, but by the end of the experiment, sea trout carried more lice — suggesting sea trout as the more natural long-term host."
  - "A greater humoral antibody response to sea lice infection was demonstrated for Atlantic salmon compared to sea trout, suggesting an immunological rather than behavioural primary defence strategy in salmon."
  - "No fish mortality occurred from sea lice infection in this study."

claims_about_uncertainty:
  - "Differences in susceptibility may partly reflect the tank experimental conditions rather than natural differential exposure; swimming performance and distribution in tanks could influence copepodid settlement."
  - "Hatchery-reared fish with potentially different immune histories were used; results may not fully represent wild population responses."

claims_about_policy_or_management:
  - "Sea trout appear to be the more natural long-term host for L. salmonis; this has implications for understanding why sea trout populations are particularly vulnerable to farm-origin lice pressure."

methodological_limitations:
  - "Experiment used hatchery-reared fish in controlled tanks; immune responses may differ from wild fish."
  - "Copepodids used were reared from farmed Atlantic salmon; preferential settlement would be expected on Atlantic salmon rather than sea trout, potentially underestimating sea trout susceptibility in the field."
  - "Experiment covers only 8 weeks; long-term effects on growth, osmoregulatory function, or survival are not assessed."

rag_summary: >
  Dawson et al. (1997) conducted a controlled laboratory challenge study comparing sea trout and Atlantic salmon under experimental infection with Lepeophtheirus salmonis. Sea trout carried more lice at week 1 and throughout the experiment, and showed lower immune-mediated clearance. Atlantic salmon exhibited a stronger humoral antibody response and shed lice faster, resulting in lower lice abundance by week 8. The findings suggest that sea trout are the more suitable long-term host for L. salmonis, likely reflecting the parasite's evolutionary adaptation to the coastal migratory behaviour of sea trout, while Atlantic salmon deploy a primarily immunological defence strategy. No mortality occurred from lice infection under experimental conditions.

