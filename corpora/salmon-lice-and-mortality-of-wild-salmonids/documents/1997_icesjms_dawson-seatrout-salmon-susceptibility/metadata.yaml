evidence_direction: supports_effect

effect_scale: individual_level

uncertainty_emphasis: low

main_uncertainty_sources:
  - sampling_representativeness
  - transferability

key_claims:
  - "Week 1 mean lice abundance (SE): single-species sea trout 188.0 (2.7) vs Atlantic salmon 165.8 (10.2); all sea trout groups exceeded all salmon groups (p=0.039, n=8 fish per tank, quadruplicate tanks)."
  - "By week 8, sea trout carried ~20 lice fish⁻¹ vs Atlantic salmon ~4–7 (e.g. single-species salmon 6.8 (2.1)); all sea trout groups exceeded all salmon (p=0.012)."
  - "Lice survival from week 1: by week 8 only 10.6% on sea trout vs 4.1% on salmon (single-species); greater proportion survived on sea trout from week 6 onward (p=0.046 at week 6)."
  - "Copepodids from farmed Atlantic salmon eggs (~4800 per tank, 3 h challenge) produced non-selective settlement; differential chalimus mortality favoured higher early loads on sea trout."
  - "Atlantic salmon had more category 3 head lesions weeks 3–5 (p=0.036); sea trout more category 3 anal lesions weeks 7–8 (p=0.04); dorsal fin erosion categories 1–2 on all infected fish; no infection-related mortality."
  - "Greater humoral antibody response in Atlantic salmon vs sea trout supports immunological clearance as salmon's primary defence vs possible freshwater-return behaviour in sea trout."

claims_about_uncertainty:
  - "Differences in susceptibility may partly reflect the tank experimental conditions rather than natural differential exposure; swimming performance and distribution in tanks could influence copepodid settlement."
  - "Hatchery-reared fish with potentially different immune histories were used; results may not fully represent wild population responses."

claims_about_policy_or_management:
  - "Sea trout appear to be the more natural long-term host for L. salmonis; this has implications for understanding why sea trout populations are particularly vulnerable to farm-origin lice pressure."

methodological_limitations:
  - "Hatchery-reared fish (431–511 g sea trout, 413–499 g salmon) in 400 L circular tanks, 7.9–11.4°C, 32‰, Oct–Dec 1996; not wild post-smolts."
  - "Copepodids from west-coast farmed Atlantic salmon eggs; authors argue preferential settlement on salmon was not observed—non-selective attachment then differential survival."
  - "Eight-week duration only; weekly anaesthesia and seven body-region lice counts; no osmotic or growth endpoints."
  - "Skin damage scored on ordinal scales (Tables 1–2); cumulative damage not significantly different between groups (p>0.05)."

rag_summary: >
  Dawson et al. (1997) compared hatchery sea trout and Atlantic salmon in quadruplicate single- and mixed-species tank challenges with ~4800 L. salmonis copepodids per tank (eggs from Scottish farmed salmon). At week 1, mean abundance was higher on all sea trout groups (e.g. 188.0 vs 165.8 lice fish⁻¹); by week 8 sea trout retained roughly threefold more lice (e.g. 20.0 vs 6.8) while salmon showed stronger immune-mediated clearance (10.6% vs 4.1% survival from week-1 loads). Chalimus initially favoured dorsal fins; mobile stages concentrated on head and dorsal surfaces. Atlantic salmon developed severer head lesions mid-experiment; sea trout severer anal lesions late. A stronger humoral antibody response in salmon supports immunological defence, whereas sea trout may reflect a parasite–host match to coastal residency. No lice-induced mortality occurred. Funded by a BBSRC CASE studentship; University of Aberdeen and SOAEFD Marine Laboratory authors.

