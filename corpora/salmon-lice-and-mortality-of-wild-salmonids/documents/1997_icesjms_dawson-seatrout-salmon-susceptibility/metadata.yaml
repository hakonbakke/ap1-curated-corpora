# DEL D — SYNTESE
# [CLAUDE — BØR VERIFISERES AV FAGPERSON]
# ======================================================================

consensus_signal: high_agreement

quality_signal: medium

quality_rationale: >
  A well-designed controlled experimental study with replicated tank groups, individual fish-level assessments, and comparison of single-species and mixed-species conditions. The main limitation is the use of hatchery-reared fish and artificial infection, which limits direct extrapolation to wild conditions. As a 1997 study it predates more recent immunological tools, and the absence of mortality observations is a limitation relative to post-smolt field studies.

controversy_role: foundational

relevance_signal: medium

relevance_rationale: >
  Provides important mechanistic baseline for understanding differential susceptibility between sea trout and Atlantic salmon (Q4, Q6). Sea trout vulnerability is a key reason why sea trout population data are used in Norwegian TLS monitoring. The finding that sea trout are the more natural long-term host helps explain field observations of heavy infestation on sea trout in proximity to farms.

transferability: medium

transferability_notes: >
  Scottish laboratory conditions; hatchery-reared fish. Findings on differential host susceptibility are broadly applicable but may not quantitatively reflect wild fish responses. The infection dose and temperature conditions were specific to the experiment.


# ======================================================================
# DEL E — RELASJONER
# [CLAUDE — BØR VERIFISERES AV FAGPERSON]
# ======================================================================

included_because: >
  Classic experimental study establishing the foundational finding that sea trout are more susceptible to L. salmonis than Atlantic salmon over an extended infection period. This result underpins the use of sea trout as sentinel species in lice monitoring (as in the Norwegian TLS) and helps explain the relatively greater impact of farm-origin lice on sea trout populations.

