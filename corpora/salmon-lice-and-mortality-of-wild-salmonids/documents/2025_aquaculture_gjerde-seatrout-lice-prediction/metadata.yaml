key_claims:
  - "Cross-validation of the Myksvoll et al. (2018) dataset shows that Predicted Mean Lice Density (PMLD) from the hydrodynamic model is a very poor predictor of observed mean lice burden (OMLB) on sea trout (RPD = 1.18–1.19; r² ≈ 0.30)."
  - "The 95% confidence interval of predicted lice burden from Model 1 spans about one unit along the entire range of PMLD — approximately three times the span of the mortality risk criteria (0–0.3 lice/g) used in the TLS classification."
  - "Using a single 15×15 km grid cell (144 km²), the model cannot reliably classify a production zone as Green vs. Yellow or Yellow vs. Red."
  - "Reliable Green/Yellow classification requires PMLD data from a sea area of at least 28,800 km² — larger than most of the 13 Norwegian production zones (the largest is ~15,784 km²)."
  - "Myksvoll et al. (2018) overstated the model's reliability by using Spearman rank correlation without cross-validation; the Kendall correlation (more appropriate) is only 0.52."

claims_about_uncertainty:
  - "The poor predictive power is not a function of the statistical model chosen — all four linear regression models, the non-linear logistic model, and the threshold model give very similar, very low predictive power."
  - "The poor predictive power is likely due to the low information content of PMLD itself for actual lice burden on individual fish — not correctable by choosing a different statistical approach."

claims_about_policy_or_management:
  - "Given the very low predictive power of PMLD, assigning a reliable Green, Yellow, or Red classification to a production zone using PMLD alone is not statistically justified."
  - "The TLS relies on a model component (PMLD) that has not been validated at the spatial scales required for production zone classification."
  - "The targeted species for TLS is Atlantic salmon post-smolts (~20g), not sea trout (<150g) — the validation data used by Myksvoll et al. (2018) therefore also mismatches the target species."

methodological_limitations:
  - "The analysis re-uses data from Myksvoll et al. (2018) — original data collection design was not intended for cross-validation."
  - "The first author (Gjerde) presented these results as a witness in two court cases by salmon farmers against the Norwegian state; this potential conflict of interest should be noted, though neither court found in favour of the farmers."

rag_summary: >
  Gjerde & Aslam (2025) perform a rigorous cross-validation of a key component of the Norwegian Traffic Light System: the hydrodynamic salmon lice particle model used to predict lice infestation pressure on wild fish. Using the dataset from Myksvoll et al. (2018) — 102 coastal locations, 5211 wild sea trout, three years — they show that the model's predicted mean lice density (PMLD) explains only ~30% of variation in observed lice burden on sea trout (RPD ≈ 1.18). The 95% confidence interval of predictions spans nearly the entire range of the mortality risk criteria used for TLS classification. Reliable Green/Yellow classification would require sea area data larger than most production zones. This constitutes a strong methodological critique of a foundational TLS model component.

coi_declared: yes

coi_notes: >
  First author (Bjarne Gjerde, retired Nofima) testified as a witness in two court cases by Norwegian salmon farmers against the Norwegian state (district court January 2020, court of appeal February 2021). Farmers lost both cases. Neither author received funding for this specific work. The conflict of interest is declared in the paper.


# ======================================================================
# DEL D — SYNTESE
# [CLAUDE — BØR VERIFISERES AV FAGPERSON]
# ======================================================================

consensus_signal: contested

quality_signal: medium

quality_rationale: >
  The statistical analysis is technically rigorous: four different regression models, a non-linear logistic model, and a threshold model all give convergent results, and cross-validation is correctly applied. The findings of poor predictive power are internally consistent. However, the paper relies entirely on re-analysis of one previously published dataset; the analysis cannot assess whether the poor performance reflects a fundamental model limitation or a specific limitation of the Myksvoll et al. (2018) dataset. The declared conflict of interest (expert witness for salmon farmers) does not invalidate the statistical findings but is relevant context.

controversy_role: critical

relevance_signal: high

relevance_rationale: >
  Directly relevant to Q5 (model predictions of infestation on wild fish) and Q10 (TLS robustness). The lice particle model is a core operational component of the TLS annual risk assessment. If PMLD cannot reliably distinguish Green/Yellow/Red at the production zone scale, this undermines a key element of the regulatory framework. This paper should be read alongside Myksvoll et al. (2018) and the Stige et al. (2022) calibration study.

transferability: high

transferability_notes: >
  Directly applicable to the Norwegian TLS context, which is the primary regulatory focus of this corpus. Findings on model performance limitations are relevant to any jurisdiction using hydrodynamic lice particle models as a regulatory tool.


# ======================================================================
# DEL E — RELASJONER
# [CLAUDE — BØR VERIFISERES AV FAGPERSON]
# ======================================================================

included_because: >
  Provides the most rigorous statistical challenge to the predictive validity of a core TLS model component. The finding that PMLD cannot reliably classify production zones — even after cross-validation with multiple model types — is directly relevant to Q5 and Q10. It complements methodological critiques in other corpus documents (e.g. Jansen & Gjerde 2021, Stige et al. 2022) that challenge model calibration and VPS reliability.

