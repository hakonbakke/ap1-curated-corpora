# DEL D — SYNTESE
consensus_signal: moderate_agreement
quality_signal: strong
quality_rationale: >
  Novel individual parasite tracking (Folk & Mennerat 2024 method) with replicated treatments and
  three geographic lice origins; mixed models and survival analysis. Strong internal validity;
  external validity limited to tank scale.

controversy_role: supportive
relevance_signal: medium
relevance_rationale: >
  Mechanistic Q2 (fecundity/larval production under farm densities) and Q6 (virulence, host
  damage). Complements population-level and regulatory papers with individual-level ecology.

transferability: medium
transferability_notes: >
  Qualitative density-dependence and immunity mechanism likely general; quantitative fecundity
  and size relationships require field validation in pens.

# DEL E — RELASJONER
included_because: >
  First individual-level experimental demonstration that aquaculture-like host density depresses
  salmon louse performance and may interact with selection for virulence — informs how farm lice
  biology affects wild fish during spillover.

