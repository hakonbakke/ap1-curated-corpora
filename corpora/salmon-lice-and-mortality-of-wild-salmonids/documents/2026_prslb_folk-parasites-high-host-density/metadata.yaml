key_claims:
  - "178 RFID-tagged (p-Chip) adult female lice tracked weekly Nov 2020–Dec 2021 across six 500L tanks; 99 post-smolt hosts; lice from three Norwegian farm locations (Austevoll, Oppedal, Fosså)"
  - "Low density: 5 fish, 15 copepodites/fish full tank; high density: 15–16 fish, 30 copepodites/fish in reduced volume — mimics natural vs aquaculture exposure"
  - "Prevalence 98% (high) vs 93% (low); mean adult female load 3.11 vs 2.33 (p=0.13) despite double infection dose — indicates elevated juvenile mortality at high density"
  - "High density: smaller somatic and genital segment size, delayed 2nd-clutch reproduction (~12–15 DDPI), lower early and lifetime fecundity (negative binomial GLMs, p<0.01)"
  - "Larger females reproduce earlier, more fecund, longer-lived — body size integrates early conditions (Table 3; Figure 3)"
  - "Mechanism: dose-dependent host cellular immunity (interleukins at attachment) and lice immune-evasion trade-off — not significant within-host competition for resources once adult size accounted for"
  - "Field-consistent: farmed-host lice ~19% smaller than wild-host lice; aquaculture may select for faster, more virulent life histories (Mennerat et al. 2017; Ugelvik et al. 2017) with spillover risk to wild salmon"
  - "Longest-lived female: 322 DPI, 22 clutches (prior record 11 at 10°C); temperature 8.8–9.5°C; ethics FOTS 24917"

claims_about_uncertainty:
  - "Cannot fully separate host crowding stress from immune response to dose (high-density infection used lowered water level)"
  - "500L tank results may not scale to commercial open-net pens; males not taggable and excluded"

claims_about_policy_or_management:
  - "Average-abundance treatment thresholds may ignore density-dependent reductions in per-capita louse fecundity and elevated virulence evolution on farms"
  - "Farm-dominated host populations imply spillover to wild fish may involve more virulent lice phenotypes than wild-adapted lice"

methodological_limitations:
  - "Laboratory post-smolt from single producer; host replacement at ~45 cm / 1 kg"
  - "Second in-tank generation coexisted with tracked adults in later phase of experiment"
  - "46 of 178 females never recovered from outlet filters (censored mortality uncertain)"

rag_summary: >
  Folk et al. (2026, Proc R Soc B 293:20251782) RFID-tag individual female salmon lice under
  replicated low (5 fish, 15 copepodites) vs high (15–16 fish, 30 copepodites) host-density tanks.
  High density → greater juvenile mortality, smaller adults, delayed reproduction, lower lifetime
  fecundity (up to 22 clutches in low-density outlier). Mechanism: stronger host immunity at high
  dose, not adult competition. Links aquaculture conditions to virulence evolution and wild salmon
  spillover risk. Dryad 10.5061/dryad.547d7wmm4; RCN grant 287405.

