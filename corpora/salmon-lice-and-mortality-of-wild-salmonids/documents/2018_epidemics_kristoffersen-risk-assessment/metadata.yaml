# DEL D - SYNTESE OG PLASSERING I LITTERATUREN
consensus_signal: moderate_agreement

quality_signal: moderate

quality_rationale: >
  Published in Epidemics, a respected peer-reviewed journal for infectious disease modelling. The paper is methodologically transparent and includes sensitivity analyses. However, the authors themselves acknowledge that many processes in the causal chain are poorly documented, and the model relies on several simplifying assumptions (shortest-path routing, constant progression rate, sentinel cage calibration) that were later identified as limitations relative to the IMR approach. The paper's use for official regulatory purposes (Norwegian TLS) implies external scrutiny, but its core assumptions remain contested.

controversy_role: supports_effect

relevance_signal: high

relevance_rationale: >
  This is the NVI risk assessment model, one of the three models used in the Norwegian TLS expert group process. It directly addresses Q2-Q5, Q7-Q8, and Q10 and provides an alternative modelling framework to the IMR VPS model (Johnsen et al. 2021), with different assumptions about migration routing and calibration. Essential for understanding the diversity of approaches in the TLS and for evaluating the robustness of mortality estimates.

transferability: low

transferability_notes: >
  Norway-specific: parameterised using Norwegian farm reporting data, Norwegian sentinel cage data, and Norwegian river geography. The quantitative risk assessment framework is conceptually transferable to other salmon-farming regions but requires local re-parameterisation. The density-dependence finding may have broader implications for other intensive farming regions.

# DEL E - RELASJONER OG KURATORKOMMENTARER
included_because: >
  Presents the NVI risk assessment model for the Norwegian TLS, providing an alternative modelling framework to the IMR VPS model (Johnsen et al. 2021) with different assumptions. Directly quantifies lice-induced mortality for all 401 Norwegian salmon rivers and 13 production zones for 2014-2016. Essential for understanding the basis of the Norwegian TLS and the diversity of model approaches underlying it. The connection between lead author Kristoffersen and co-author Jansen (who later critiqued the IMR model) is an important context for corpus interpretation.

