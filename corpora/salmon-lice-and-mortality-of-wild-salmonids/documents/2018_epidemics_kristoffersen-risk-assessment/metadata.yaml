key_claims:
  - "TLS-oriented model for 401 rivers, 13 production zones, 2014–2016: farm egg output per biomass varies up to 8.1× (zones 3 vs 13); Pearson r=0.70 with local biomass density (p=0.008)."
  - "Sentinel-cage calibration (N=7911 fish, 329 trials): log(IP) coefficient 0.843 (p<0.001), theta=2.733, ICC=0.551; explains ~39% log-scale variation (adj. R²)."
  - "Highest expected lice loads and mortality in production zone 3 (west); zone 6 second-highest proportional mortality 2016 despite lower per-river infestation than zone 3."
  - "2016 basic scenario river mortality ~2–17% (zone 3), worst-case ~10–72%; overall higher risk in 2016 than 2014–2015; progression 8.2 cm s⁻¹, 20 g smolts, Taranger et al. (2015) mortality steps."
  - "Sensitivity: migration timing ±2–4 weeks, period 20–80 days, progression 4.25–12.75 cm s⁻¹, and infestation random effects dominate uncertainty; shortest-path routing assumed."

claims_about_uncertainty:
  - "Many processes in the chain of events are poorly documented, generating large uncertainties in both infestation rate and parasite-induced mortality estimates"
  - "The model is argued to be suited for assessing relative (not absolute) spatial and temporal risks"
  - "Best-case and worst-case scenarios are presented to bracket uncertainty in empirical infestation rates"

claims_about_policy_or_management:
  - "The model was developed to facilitate political decision-making concerning regulation of production capacity within production zones in Norway"
  - "The Norwegian coast has been divided into 13 production zones for the Traffic Light System, and volume adjustments are obligated every two years based on salmon lice effects on wild salmonids"
  - "Only indicators with density-dependent effects on the environment were to be considered for TLS; salmon lice was designated the first and only such indicator"

methodological_limitations:
  - "Shortest-path routing ignores hydrodynamic effects on post-smolt migration, potentially misrepresenting actual lice exposure in complex fjord systems"
  - "Constant progression rate assumption for post-smolt migration is a simplification"
  - "Lice mortality thresholds from Taranger et al. (2015) are based on limited experimental data with uncertain applicability to wild post-smolts"
  - "Kernel-density infestation model is empirical and may not accurately extrapolate to areas or conditions outside the sentinel cage calibration data"
  - "Model chains five or more processes each with their own uncertainty; error propagation is not fully quantified"
  - "Density-dependent effects at the farm and zone level are not mechanistically modelled; the density-dependence finding is correlational"

rag_summary: >
  Kristoffersen et al. (2018) chain farm-reported female lice and temperature to egg production, kernel-smoothed infestation pressure (100 km seaway, 0.17 d⁻¹ larval mortality), sentinel-cage negative-binomial infestation, shortest-path migration at 8.2 cm s⁻¹, and Taranger et al. (2015) stepwise mortality for 401 Norwegian rivers (2014–2016). West-coast zone 3 shows highest exposure; egg output per farm biomass spans 8× with density-dependence (LBD r=0.70). Zone-level proportional mortality in 2016 reaches ~2–17% (basic) and ~10–72% (worst case) for some west-coast rivers. Authors stress large uncertainties (timing, cage vs migrating smolt, mortality thresholds) but argue the model captures relative spatiotemporal risk for TLS production-zone regulation. Expert-group work; no author COI declared.

