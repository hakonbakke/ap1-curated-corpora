key_claims:
  - "Smolt migration begins earlier and is shorter than assumed by the TLS, biasing mortality estimates upward"
  - "Lice larvae production from farms is overestimated by excluding reducing biological and environmental effects"
  - "Post-attachment lice loss (40-80%) is only partially corrected in two of seven TLS assessment endpoints"
  - "Lice infection levels on farms are not associated with measurable effects on wild salmon populations"
  - "Mortality thresholds may be too low relative to available experimental evidence"
claims_about_uncertainty:
  - "All seven TLS assessment endpoints share common sources of potential overestimation bias"
  - "Model calibration against potentially biased observational data does not eliminate systematic error"
claims_about_policy_or_management:
  - "The TLS in its current form likely overestimates lice-induced mortality of wild salmon"
  - "Recommended improvements include adjusting migration timing, incorporating lice biology, and revising mortality thresholds"
methodological_limitations:
  - "Draws heavily on acoustic telemetry from limited rivers in western Norway"
  - "Arguments consistently favour overestimation; underestimation factors not equally explored"
  - "Funded by aquaculture industry; first author has industry board membership"
rag_summary: >
  Comprehensive critical review of the Norwegian Traffic Light System (TLS) methodology for assessing
  salmon lice impact on wild salmonids. Reviews literature on lice biology, environmental factors, and
  smolt behaviour. Main findings: (1) migration timing mismatch biases data upward, (2) lice larvae
  production overestimated, (3) model calibration flawed, (4) mortality thresholds potentially too low,
  (5) no measurable population-level association between farm lice and wild salmon status. Argues TLS
  systematically overestimates lice-induced mortality. Funded partly by aquaculture industry.
coi_declared: yes
coi_notes: >
  Funded by Salmon Tracking 2030 (aquaculture industry-funded project in PO3/PO4) and FHF
  (Norwegian Seafood Research Fund). First author (van Nes) is board member of Nova Sea,
  a salmon farming company. Second author affiliated with Akvaplan-Niva.
consensus_signal: contested
quality_signal: medium
quality_rationale: >
  Comprehensive review with extensive literature coverage. Peer-reviewed with five reviewers.
  However, consistently argues in one direction (overestimation). Conflict of interest concerns
  raised by Stige et al. 2025 regarding industry funding and board membership.
controversy_role: critical
relevance_signal: high
relevance_rationale: >
  The most comprehensive critique of TLS methodology from the industry-adjacent perspective.
  Central to the scientific debate captured in this corpus. Prompted a published comment-response
  exchange.
transferability: medium
transferability_notes: >
  Points about migration timing, lice biology, and model calibration apply broadly.
  Specific critique is tied to Norwegian TLS.
included_because: >
  Central critical review of the TLS, triggering a published debate. Provides the most detailed
  compilation of arguments for why the TLS may overestimate lice-induced mortality. Essential
  for representing the full spectrum of scientific positions in this corpus.
