# DEL D - SYNTESE OG PLASSERING I LITTERATUREN
consensus_signal: strong_agreement
quality_signal: strong
quality_rationale: >
  Large-scale (n=29,817) randomized controlled trial with balanced design, four independent trials across
  contrasting lice environments, and high-efficiency recapture trap (~90% efficiency). One of the most
  methodologically rigorous field experiments on salmon lice mortality in the published literature.
  Results replicated across years strengthen causal inference.

controversy_role: supports_effect

relevance_signal: high
relevance_rationale: >
  Provides the most striking direct quantitative evidence for Q4 (smolt exposure timing) and Q8 (fraction
  of smolts dying from lice), with an empirical extreme case far exceeding TLS thresholds. Directly
  relevant to Norwegian regulatory debates about farm location and fallow regimes.

transferability: medium
transferability_notes: >
  Conducted in Hardangerfjord, one of Norway's most intensive aquaculture fjords. The extreme mortality
  observed likely reflects unusually high farm density; results should be interpreted with caution when
  extrapolating to lower-density production regions or to fully wild smolt populations.

# DEL E - RELASJONER OG KURATORKOMMENTARER
included_because: >
  This paper provides the strongest single-study field-experimental evidence for catastrophic smolt
  mortality from salmon lice, demonstrating a >50-fold survival differential when migration coincides
  with peak lice density. It fills a critical gap for Q4 and Q8 with RCT-quality evidence and directly
  calibrates TLS thresholds with empirical return data.

