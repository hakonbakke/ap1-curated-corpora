rag_summary: >
  Bøhn et al. (2020) conducted four large-scale randomized controlled trials in Hardangerfjord, Norway,
  releasing n=29,817 tagged Atlantic salmon postsmolts (half treated with SubEX lice prophylaxis, half
  sham controls) across May and June in 2013 (low-lice year, farms fallowed) and 2014 (high-lice year,
  full production). Of 559 fish recaptured over 1-4 years, return rates in most groups were 1-2.5%, but
  the untreated June 2014 group returned at only 0.03% versus 1.86% in the treated group — a >50-fold
  mortality risk differential. The study demonstrates that migration timing relative to the seasonal lice
  peak is decisive, and that catastrophic mortality events can occur even within a National Salmon Fjord.
  Key limitations: hatchery-reared smolts used as surrogates; lice exposure estimated from sentinel cages
  rather than direct measurement on released fish.

