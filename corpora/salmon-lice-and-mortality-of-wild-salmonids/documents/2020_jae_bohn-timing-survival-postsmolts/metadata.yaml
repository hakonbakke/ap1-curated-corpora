# DEL D - SYNTESE OG PLASSERING I LITTERATUREN
consensus_signal: moderate_agreement

quality_signal: strong

quality_rationale: >
  Large balanced RCT (n≈30k releases, 559 returns), four nested trials, ~90% trap efficiency,
  sentinel + lakseslus.no hydrodynamic validation. Among strongest field experiments on lice
  mortality; 2013 low-lice year shows prophylaxis can hurt returns (RR<1), supporting context-
  dependence. Single fjord limits geographic generalisation.

controversy_role: supportive

relevance_signal: high

relevance_rationale: >
  Extreme empirical calibration point for Q8 and migration-timing Q4; explicitly discusses TLS
  colour thresholds. Complements VPS/modelling papers with field mortality under known lice contrast.

transferability: medium

transferability_notes: >
  Hardanger is among Norway's highest aquaculture-density fjords; catastrophic June 2014 result
  may not transfer to lower-density regions or fully wild smolt populations.

# DEL E - RELASJONER OG KURATORKOMMENTARER
included_because: >
  Provides RCT-quality evidence that lice timing and farm-driven infestation pressure can cause
  near-total smolt mortality when late migration coincides with peak lice — a concrete empirical
  anchor for TLS threshold debates and Q4/Q8 in the corpus.

