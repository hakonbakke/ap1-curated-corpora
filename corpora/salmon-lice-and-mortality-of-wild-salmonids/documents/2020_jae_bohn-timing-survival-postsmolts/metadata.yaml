rag_summary: >
  Bøhn et al. (2020, J Appl Ecol 57:1149-1160) ran four large RCTs in Hardangerfjord releasing
  n=29,817 CWT-tagged postsmolts (50% SubEX prophylaxis) in May/June 2013 (fallowed farms,
  low lice) vs 2014 (full production, high lice). Sentinel 14-day Lice Infestation Pressure rose
  ~25-fold May→June 2014 (0.37→8.87 lice/fish); 2013 fallow cut pressure 84-92% vs 2014. Returns:
  typical 1-2.5% except June 2014 controls 0.03% (1/2978) vs treated 1.86% (70/3770), RR=55.3.
  GLM confirms lice pressure reduces return probability with prophylaxis benefit at high pressure.
  Directly relevant to Norwegian TLS red threshold (>30% mortality) and Q4 migration timing.

