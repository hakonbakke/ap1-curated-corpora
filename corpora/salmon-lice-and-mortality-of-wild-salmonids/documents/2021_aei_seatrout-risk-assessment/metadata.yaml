# [CLAUDE — BØR VERIFISERES AV FAGPERSON]
consensus_signal: moderate_agreement
quality_signal: strong
quality_rationale: >
  Well-documented model methodology building on validated bio-hydrodynamic framework.
  Clear sensitivity analysis with multiple migration timings and rivers. Peer-reviewed
  in Aquaculture Environment Interactions. Limitation is proxy approach (habitat loss
  rather than direct mortality).

controversy_role: supportive
relevance_signal: medium
relevance_rationale: >
  Extends the corpus focus to sea trout, which shares lice exposure pathways with salmon.
  Demonstrates the spatial and temporal variability in lice impact within production areas,
  relevant for understanding model uncertainty in the TLS.

transferability: medium
transferability_notes: >
  Method applicable wherever bio-hydrodynamic lice models exist. Sea trout biology
  parameters would need adjustment for other regions.

# DEL E — RELASJONER OG KURATORKOMMENTARER
# [CLAUDE — BØR VERIFISERES AV FAGPERSON]
included_because: >
  Demonstrates the methodological framework for estimating lice impact on sea trout, extending
  the TLS approach. Shows dramatic within-production-area variation in lice exposure, which is
  central to understanding the spatial resolution challenges of the regulatory system.

