key_claims:
  - "Sea trout in PO3 Hardangerfjord may lose 49-66% of marine living area depending on migration timing"
  - "Within-production-area variation is dramatic: Oselvo trout lose 94-98% of habitat while Etne trout lose 0-68%"
  - "Late-migrating sea trout are consistently more affected by lice than early migrants"
  - "The proposed RML and RMT indices are scalable to all production areas and rivers"

claims_about_uncertainty:
  - "Critical lice thresholds for sea trout are based on limited laboratory studies and may not reflect field conditions"
  - "Higher resolution model (160m) not yet as widely validated as the standard 800m grid"

claims_about_policy_or_management:
  - "A holistic view of environmental interactions between aquaculture and all wild species is necessary"
  - "Proposed setting RML limit values equivalent to salmon mortality limits (>30% = high, 10-30% = moderate, <10% = low)"

methodological_limitations:
  - "Does not directly model mortality — uses habitat loss as proxy"
  - "Fixed 60g fish size does not capture population-level size variation"
  - "Assumes no return to sea after premature freshwater return"

rag_summary: >
  Proposes reduced marine living area (RML) and reduced marine feeding time (RMT) as sustainability
  indicators for sea trout in the Norwegian Traffic Light System. Uses a bio-hydrodynamic model at
  160m resolution to estimate salmon lice impact on sea trout habitat in PO3 (Hardangerfjord) and PO5
  (Romsdalsfjord). Found dramatic potential impacts: 49-98% habitat loss depending on river location
  and migration timing. Late-migrating trout consistently more affected. Method scalable to all
  Norwegian production areas. Does not model mortality directly but estimates habitat loss as proxy.

