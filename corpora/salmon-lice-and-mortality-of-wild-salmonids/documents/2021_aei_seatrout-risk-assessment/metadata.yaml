key_claims:
  - "RML = ([red] + 0.5×[yellow])/total area; RMT = days until RML>30% − 70 d; 70 d marine residence, 60 g smolt, 20 km radius, 2 m depth"
  - "Impact matrix (Taranger 2015 adjusted): 100% at >30 mobile lice, 50% at 10-30, 0% at ≤10; ROC calibrated to Hardanger sentinel cages 2012-2017 (>18 / 6-18 / <6 mobile lice zones)"
  - "PO3 area-wide RML: early migrants 32%, intermediate (May 15) 49%, late (June 5) 66%"
  - "PO3 rivers: Oselvo RML 94/97/98% (early/int/late); Etne 0/17/68%; Oselvo RMT −30/−46/−56 d; Etne late only RMT −16 d"
  - "PO5 area-wide RML: 34% early → 45% intermediate → 59% late"
  - "PO5 rivers: Eira RML 83/87/85%, RMT −19/−35/−50 d; Rauma 40/43/48%, RMT −6/−24/−40 d"
  - "Late migrants (June 5) always more affected than April 24 or May 15 across POs"
  - "Proposed TLS-style RML limits for sea trout: high >30%, moderate 10-30%, low <10% (parallel to salmon mortality bands)"
  - "~430 mapped sea trout rivers in Norway; method scalable to all POs; 160×160 m grid (vs 800×800 m standard)"

claims_about_uncertainty:
  - "Thresholds from Taranger et al. laboratory work may not reflect wild field conditions; 40% sessile-to-mobile survival assumed"
  - "Fixed 60 g size; assumes no return to sea after premature freshwater return"

claims_about_policy_or_management:
  - "Holistic assessment needed for aquaculture impacts on sea trout — not salmon-only TLS focus"
  - "Inner-fjord rivers can show low RML in method while outer-fjord habitat loss still matters for stock connectivity"

methodological_limitations:
  - "Proxy indicators (RML/RMT), not direct mortality modelling"
  - "160 m grid less widely validated than 800 m grid"
  - "Does not quantify predation cost of surface refuge behaviour"

rag_summary: >
  Finstad et al. (2021, AEI 13:133-144, open access) propose Reduced Marine Living Area (RML) and
  Reduced Marine Feeding Time (RMT) for first-time migrant sea trout using 160 m bio-hydrodynamic lice
  model (PO3 Hardanger, PO5 Romsdal). Late migration (June 5) worst: PO3 RML 32-66% by timing;
  Oselvo 94-98% vs Etne 0-68%. PO5 Eira loses up to 71% marine time (50 of 70 d). ROC thresholds
  >30/10-30/≤10 lice from Taranger index. Suggests RML bands matching salmon TLS (>30% high). DNV
  funding to first author; ExpGrp/TLS steering acknowledged.

