key_claims:
  - "Semi-quantitative 2D ranking (effect × development, 2015): escaped farmed salmon highest on both axes (~0.83 effect, ~0.80 development)—largest expanding population threat."
  - "Salmon lice second expanding population threat (~0.70 effect, ~0.58 development); may render populations critically endangered (>75% adult reduction or >10% farm introgression) with high likelihood of further loss."
  - "2015 Norway: ~382 million farmed salmon vs ~522,000 wild spawners (~732:1); worst-case >1 billion lice larvae day⁻¹ possible under regulations (Taranger et al. 2015)."
  - "Experimental smolt protection studies: additional marine mortality from lice 0.6–39% across sites/years; large reductions in returning adults in affected populations (>25% typical)."
  - "Stabilized threats: G. salaris, acidification, hydropower/habitat alteration; overexploitation downgraded after conservation-limit management."
  - "51/109 Norwegian populations show significant farm introgression (mean 6.4%, max 42%; Karlsson et al. 2016); lice risk moderate–high on parts of coast per national risk assessments."

claims_about_uncertainty:
  - "The 2D classification system involves expert judgment and is semi-quantitative; exact placement of threats involves uncertainty."
  - "The relative ranking of escaped salmon vs. salmon lice as the top threats reflects scientific consensus of the Norwegian Atlantic Salmon Committee, not formal meta-analysis."

claims_about_policy_or_management:
  - "The classification system is designed to support prioritisation of management measures and can be used as a template for other countries."
  - "Salmon lice and escaped farmed salmon must be managed at national scale to prevent further population losses."
  - "The Traffic Light System and related regulatory instruments are relevant management responses to the lice threat."

methodological_limitations:
  - "Semi-quantitative scoring involves expert elicitation; different expert panels may reach different rankings."
  - "The classification focuses on Norwegian populations; ranking may differ for other North Atlantic regions."

rag_summary: >
  Forseth et al. (2017) report the Norwegian Scientific Advisory Committee for Atlantic Salmon Management ranking of 15 anthropogenic impacts on >400 Norwegian salmon rivers using a continuous effect×development matrix. Escaped farmed salmon scores highest (expanding population threat), followed by salmon lice—both capable of pushing populations past critical thresholds (>75% spawner loss or >10% farm gene introgression). Lice effects synthesise 0.6–39% experimentally estimated extra smolt mortality, regional/national infestation patterns, and escalating farm biomass (~732× wild spawner abundance in 2015). Gyrodactylus salaris, acidification and hydropower are stabilised threats with mitigation in place; overexploitation is no longer ranked major. The framework supports national prioritisation and underpins lice-focused regulation (traffic-light system). Open Access CC BY 4.0; multi-agency public research authorship.

coi_declared: no

coi_notes: >
  Open Access (CC BY 4.0). Authors represent NINA, Uni Research, IMR, NIVA, Norwegian Veterinary Institute, UiT and University of Oslo—the Atlantic Salmon Committee advisory group. No industry funding or conflict-of-interest statement in the paper.


