included_because: >
  Provides the authoritative Norwegian scientific consensus on threats to Atlantic salmon, establishing salmon lice from aquaculture as an 'expanding population threat' capable of causing populations to become critically endangered. This is the foundational policy-science document underpinning the regulatory importance of lice management in Norway, and is essential context for understanding why the TLS was developed and how lice are ranked against other threats.

