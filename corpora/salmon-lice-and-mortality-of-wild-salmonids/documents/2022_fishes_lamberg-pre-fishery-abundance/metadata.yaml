rag_summary: >
  Lamberg and Imsland (2022) propose using "merged pre-fishery abundance" (PFA) — combining Atlantic salmon and anadromous brown trout (sea trout) population counts — as a more ecologically valid metric for evaluating salmonid population status in Norwegian river regions. Using data from 27 rivers in 8 regions (2019), collected via underwater video, snorkelling, and catch statistics, they standardise merged PFA using river hydrogeography and mean smolt age. The highest standardised regional PFA was approximately four times higher than the lowest. Compared to the conventional single-species (salmon only) approach, the merged PFA revealed a substantially different picture of population status in most regions, with differences largely driven by variation in sea trout population sizes. The authors argue that since sea trout can serve as a proxy for lice severity in fjord systems, monitoring merged PFA could help validate whether management interventions (such as TLS regulations) are achieving conservation goals. Key limitations include single-year data, selective regional coverage, and unquantified interspecific competition.

