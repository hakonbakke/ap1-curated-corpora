rag_summary: >
  Lamberg and Imsland (2022, Fishes 7:264) compare merged pre-fishery abundance (PFA: Atlantic salmon + sea trout) vs salmon-only spawning target (ST) rankings across 27 rivers in 8 Norwegian regions (58.6°N–69.0°N, 2019). Standardised merged PFA varied >4× between regions; regions 1, 3, and 6 were 2–4× above others. ST and merged-PFA regional ranks did not correlate (Spearman rs = −0.071, p = 0.882). Sea-trout inclusion changed status in 7/8 regions. Smolt age 2.3–4.1 years; hydrogeography standardisation (river area 26–112 km² accessible, discharge 1.5–5.0×10⁶ m³/s). Authors argue merged PFA better reflects anthropogenic impacts including lice, as sea trout remain in fjords longer. Funded by SALT2020/FHF 901575, Vestland county, POP-Kunnskapsinkubator. Single-year snapshot; no spawning targets for trout.

