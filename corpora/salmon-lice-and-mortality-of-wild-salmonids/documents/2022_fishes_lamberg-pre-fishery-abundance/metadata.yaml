curator_note: >
  Open access article (CC BY, MDPI). This is a methodological/monitoring paper, not a lice-impact study per se. Its value for this corpus is conceptual: it demonstrates the inadequacy of single-species salmon monitoring for evaluating the full suite of anthropogenic impacts on wild salmonids, and proposes a concrete, practical alternative. The suggestion that sea trout population trends could be used as a validation signal for lice management effectiveness has not yet been formally tested but is an important research agenda item.

