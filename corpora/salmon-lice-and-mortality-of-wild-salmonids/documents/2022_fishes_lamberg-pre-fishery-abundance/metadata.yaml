# DEL D - SYNTESE OG PLASSERING I LITTERATUREN
consensus_signal: unclear
quality_signal: moderate
quality_rationale: >
  Methodological paper presenting a reasonable and practical framework for improving salmonid population monitoring in Norway. The study uses real monitoring data from 27 rivers across 8 regions, with sensible standardisation methods. However, the analysis is cross-sectional (single year), the regional coverage is convenience-based, and the proposed metric has not been prospectively validated. Published in MDPI Fishes (open access), which has lower impact than specialist fisheries journals; peer review quality is variable. The core methodological proposal is sound and practically motivated.

controversy_role: practical_implications

relevance_signal: medium
relevance_rationale: >
  Primarily relevant to Q9 (population-level impacts) and Q10 (TLS robustness). This paper is included not because it directly measures lice-induced mortality, but because it proposes a monitoring framework that could be used to detect whether lice management is actually working at the population level. The suggestion that sea trout could serve as a "lice proxy" — and that their population trends could validate TLS effectiveness — is a valuable conceptual contribution for the synthesis of evidence on TLS robustness.

transferability: medium
transferability_notes: >
  The methodological approach (merging multi-species PFA with hydrogeographic standardisation) is in principle applicable across Norwegian salmon management zones. The specific results are limited to 2019 and the 8 selected regions. The concept of using sea trout population trends as a validation signal for lice management is broadly transferable.

# DEL E - RELASJONER OG KURATORKOMMENTARER
included_because: >
  The paper fills a gap in the corpus by addressing how we could better measure whether lice management (TLS) is actually achieving population-level conservation goals. By proposing merged PFA as a more comprehensive population metric — one that includes sea trout, which are sensitive to lice but excluded from the TLS — it provides a framework for validating management effectiveness. It complements the mechanistic studies (e.g., Hawley et al. 2024, Johnsen et al. 2021) by addressing the population monitoring side of the evidence chain.

