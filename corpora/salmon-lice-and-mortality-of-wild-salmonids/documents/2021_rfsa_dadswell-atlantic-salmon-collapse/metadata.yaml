key_claims:
  - "Since ~1985 cyclic adult returns ceased across much of NA and Europe; remote pristine rivers without farms also collapsed"
  - "Four collapse signatures: (1) cycles stop, (2) abundance flatlines, (3) mean adult size declines, (4) earliest collapse farthest from NASpG"
  - "Figure 8 / ICES: NA 1SW pre-fishery abundance fell ~85% (700-800k to 110-150k 1990s); NA 2SW ~90% (900k to 100k); southern Europe ~70% total decline"
  - "Pre-1985 North Atlantic PFA estimated 6-9 million salmon; ~2500 historical stocks"
  - "Hatchery: Mactaquac 2SW returns 0.35-1.5% before 1985 → collapsed after; 1SW 0.9-4.5% → low; Penobscot 2SW 0.2-1.3% similar pattern (Figure 7)"
  - "Rejects single-cause explanations: climate, aquaculture/lice, prey, predators — stocks near NASpG persist with cycling; lice cannot explain farm-remote collapses"
  - "Primary hypothesis: IUU high-seas fisheries (paired trawl, Greenland intercept, post-1985 surveillance gaps outside EEZs)"
  - "Legal high-seas fisheries (Greenland, Faroes, Norwegian Sea) historically reduced returns; closures 1980s-1990s but monitoring gaps remain"

claims_about_uncertainty:
  - "IUU mortality not directly quantifiable; indirect spatial/temporal argument"
  - "Multi-stressor synthesis (IUU + climate stress + long migration mortality) proposed"

claims_about_policy_or_management:
  - "Freshwater restoration, farm regulation, and angling limits failed to reverse decline → marine cause likely dominant"
  - "International high-seas surveillance prioritisation recommended over sole aquaculture focus"

methodological_limitations:
  - "No new primary data; reinterpretation of published series"
  - "May underweight regional lice RCT and fjord-specific aquaculture evidence (Norway, BC)"

rag_summary: >
  Dadswell et al. (2021, Rev Fish Sci Aquac) review North Atlantic salmon collapse since 1985: loss of
  ~10-yr return cycles, flatlined runs, smaller adults, NASpG-distance gradient. Cites ~85-90% NA 1SW/2SW
  declines and hatchery return collapse. Argues lice/farms/climate/predators insufficient because remote
  stocks failed too; proposes IUU high-seas fishing as primary driver. Strong corpus counterpoint to Q9
  lice-dominance narrative. Taylor & Francis; academic authors (Acadia, UNB, Marine Institute, Glasgow).

