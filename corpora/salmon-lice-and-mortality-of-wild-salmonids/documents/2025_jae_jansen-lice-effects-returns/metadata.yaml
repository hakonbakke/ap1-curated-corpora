# DEL D — SYNTESE OG PLASSERING I LITTERATUREN
consensus_signal: moderate_agreement
quality_signal: strong
quality_rationale: >
  Large national dataset with transparent filtering, extensive Appendix S1 sensitivity analyses, and
  peer review in Journal of Applied Ecology. Key limitation is correlational design and sea-age inferred
  from weight; PIM explains less variance than river productivity proxies.

controversy_role: bridge_between_positions
relevance_signal: high
relevance_rationale: >
  Directly answers Evaluation Committee call for population-level in situ evidence linking farm lice
  exposure to adult returns — the critical gap between TLS modelled PIM and fisheries/conservation outcomes.
  Politically salient given Meld.St.24 sustainability targets and ongoing TLS debate.

transferability: medium
transferability_notes: >
  Quantitative PIM–return relationships are calibrated to Norwegian rivers and NVI PIM methodology;
  analytical framework transferable wherever PIM and return time series coexist.

# DEL E — RELASJONER OG KURATORKOMMENTARER
included_because: >
  First peer-reviewed study associating national river-count surveillance with TLS PIM estimates across
  >100 rivers — closes the loop between modelled post-smolt mortality and observed spawner abundance and
  size structure. Notable author trajectory: same lead author previously critiqued Johnsen et al. (2021) VPS.

