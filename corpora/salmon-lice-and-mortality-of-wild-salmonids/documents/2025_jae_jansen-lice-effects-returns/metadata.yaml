key_claims:
  - "Compiled 143 rivers / 560 river-years from NINA counts (bestand.nina.no) and mandatory rod-catch statistics; after five exclusion criteria (G. salaris, video counts, <70% river surveyed, poor conditions, missing PIM) analysed 104 rivers / 396 river-years (n=1188 model rows)"
  - "Returns R = corrected count/survey proportion + June–August catch; covariates include theoretical smolt production (TS), weighted prior-generation catch (CGW), year factors, smooth s(geo) on first three digits of river.id"
  - "Significant positive effect of (1−PIM) on 1SW returns (β₁=2.883, p<0.0005): expected reduction in grilse exceeds PIM estimate (more than 1:1)"
  - "2SW effect positive but non-significant (p=0.10); 3SW effect significantly negative (p=0.012) but from low absolute numbers — net population effect negative"
  - "Proportion 1SW predicted to fall from ~60% at low PIM to <20% at high PIM; ~10% fewer total returns at PIM ~5.5%, ~10% lower spawning weight at PIM ~10% (assumed 2/5/10 kg per class)"
  - ">70% of river-years exceed PIM where 10% return reduction is predicted; Meld.St.24 (2024–2025) <10% additional wild mortality goal implies need for substantial farm lice reductions"
  - "2024 returns ~36% below 2019 (exp(−0.45)−1), not attributed to PIM in model — likely marine survival drivers (ICES 2025, Thorstad et al. 2024)"
  - "Adjusted R²=0.70; results more supportive of TLS/VPS model outcomes than Van Nes et al. (2024) and Jansen & Gjerde (2021) critiques; addresses Eliasen et al. (2021) recommendation for in situ population-level evidence"

claims_about_uncertainty:
  - "TS and CGW explain more variance than PIM (doubling TS → +44% returns; doubling CGW → +15%)"
  - "Correlational design cannot exclude confounding; size–sea-age assignment misclassifies some fish"
  - "PIM for a river-year links to 1SW, 2SW and 3SW in subsequent years — violates independence assumption but separate size-class models qualitatively similar (Appendix S1)"
  - "Sensitivity analyses across filtering, catch-only vs count-only, and alternative TLS indices do not change qualitative conclusions"

claims_about_policy_or_management:
  - "Quantitative PIM–returns relationship enables river-specific estimates of farm lice reductions needed to meet government sustainability targets"
  - "TLS thresholds (<10%, 10–30%, >30% PIM) and biennial production adjustments (FOR-2017_61) discussed explicitly; authors argue present analysis supports TLS mortality modelling more than recent critical reviews"
  - "PIM at 5–6% associated with ~10% fewer spawners — majority of monitored rivers currently above this level (Figure 2 spatial PIM map)"

methodological_limitations:
  - "Observational — cannot prove causation"
  - "Five curator-defined data filters reduce dataset by ~29% of river-years"
  - "Zero catch imputed for 3 rivers / 11 river-years lacking catch data"
  - "Count data quality varies between institutions, teams and hydrological conditions"

rag_summary: >
  Jansen et al. (2026, J Appl Ecol 63:e70212) link NVI Traffic Light System parasite-induced mortality (PIM) estimates
  to size-structured returns of mature Atlantic salmon in 104 Norwegian rivers (396 river-years, 2019–2024). Log-normal
  GAM (mgcv, adj. R²=0.70) finds significant negative association between PIM and 1SW (<3 kg) returns (β=2.883,
  reductions exceeding PIM), shifting population composition from ~60% to <20% grilse across the PIM gradient.
  ~10% fewer total returns at PIM ~5.5%; >70% of river-years exceed that threshold vs government <10% mortality goal.
  First population-level bridge from theoretical post-smolt PIM to observed spawner numbers; supports TLS outcomes
  despite first author's earlier VPS critique (Jansen & Gjerde 2021). Open access; Dryad 10.5061/dryad.m0cfxpphh.

