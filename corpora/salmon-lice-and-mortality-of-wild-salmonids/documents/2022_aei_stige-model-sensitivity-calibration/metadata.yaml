rag_summary: >
  Stige et al. (2022, AEI 14:263-277, NVI, open access) revise Norwegian Veterinary Institute VPS model
  integrating sentinel cage (n=26697) and genetically assigned trawl (n=3502) data 2012-2021. Trawl
  infestation rate ~10× cage at equal pressure; mortality more sensitive to calibration (A1) than speed
  (7 vs 10 km/d, A2). Explains IMR-NVI-SINTEF TLS disagreements. Farm monitoring ~636 sites/year.
  Institutional COI: NVI authors vs IMR trawl-calibrated model.

coi_declared: yes

coi_notes: >
  All authors **Norwegian Veterinary Institute (NVI)** — government institute operating the **NVI VPS
  model** used alongside **IMR** and **SINTEF** in TLS expert group. NVI model historically gives
  **lower** mortality than IMR. No formal COI paragraph in extract; **institutional interest** in
  validating NVI framework vs IMR is material. Open access CC BY. Funded via government aquaculture
  management research (implicit NVI role).

