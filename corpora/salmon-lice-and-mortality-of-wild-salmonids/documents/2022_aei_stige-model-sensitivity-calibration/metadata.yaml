evidence_direction: critiques_methodology
# Does not deny lice effects on wild salmon, but demonstrates that
# mortality estimates from virtual post-smolt models are highly
# sensitive to calibration data type — directly challenging the
# reliability of models underpinning the Traffic Light System.

effect_scale: individual_level

uncertainty_emphasis: very_high

main_uncertainty_sources:
  - calibration_data
  - model_structure
  - migration_duration
  - parameter_uncertainty

key_claims:
  - "Trawl-caught post-smolts show 10 times higher infestation rates than sentinel cage post-smolts, meaning choice of calibration data type has a large impact on modelled mortality estimates."
  - "Mortality estimates are more sensitive to calibration data type (trawl vs. sentinel cage) than to assumptions about post-smolt migration speed."
  - "Systematic differences in mortality estimates between the three Norwegian virtual post-smolt models (IMR, NVI, SINTEF) are substantially explained by differences in calibration data and density-dependence assumptions."

claims_about_uncertainty:
  - "The paper directly quantifies sensitivity of mortality estimates to three key model assumptions, demonstrating that uncertainty in calibration propagates into large variation in mortality outcomes used for regulatory decisions."
  - "IMR's model (calibrated to trawl data) consistently predicts higher mortality than NVI's and SINTEF's models (calibrated to sentinel cage data); the causes of these differences were not fully understood prior to this study."

claims_about_policy_or_management:
  - "The Traffic Light System relies on virtual post-smolt models that give systematically different mortality estimates; understanding the sources of these differences is critical for the system's credibility and legitimacy."
  - "An international evaluation of the TLS identified sensitivity analysis of uncertain parameters as critical — this paper directly responds to that requirement."

methodological_limitations:
  - "Revised NVI model — paper is written from the perspective of improving the NVI model, not as an independent external review."
  - "Migration routes assumed to follow shortest sea path; actual migration behaviour is uncertain."

rag_summary: >
  Stige et al. (2022) assess the sensitivity of virtual post-smolt models
  for estimating salmon lice-induced mortality of wild Atlantic salmon
  post-smolts in Norway. Using data from 2012–2021 across all Norwegian
  coastal management areas, they show that trawl-caught post-smolts exhibit
  10 times higher infestation rates than sentinel cage post-smolts, and that
  calibration data type has a larger effect on mortality estimates than
  assumptions about migration speed. The study explains key differences
  between the three models used by the Norwegian Traffic Light System
  expert group (IMR, NVI, SINTEF) and demonstrates that mortality estimates
  are highly sensitive to assumptions that remain uncertain. Published open
  access by the Norwegian Veterinary Institute.

coi_declared: unclear
coi_notes: >
  All authors are from the Norwegian Veterinary Institute (NVI), a government
  research institution. NVI's model gives lower mortality estimates than IMR's
  model. This does not constitute a commercial COI, but NVI has an institutional
  interest in demonstrating the validity of its own modelling approach relative
  to IMR's. No formal COI declaration was found in the sections reviewed.
  Verify in the published version.


