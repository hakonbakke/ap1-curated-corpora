# DEL D - SYNTESE OG PLASSERING I LITTERATUREN
consensus_signal: contested
quality_signal: moderate
quality_rationale: >
  Short communication with a robust 8-year observational time series and rigorous standardised methods
  (DFO beach seine protocols, microscopic lice enumeration). The natural experiment design is valuable,
  but absence of statistical modelling, no reservoir host quantification, and publication as a short
  communication limit the depth of causal inference. Direct rebuttal of Routledge and Morton (2023)
  using the same dataset extended by two additional years.

controversy_role: challenges_effect

relevance_signal: high
relevance_rationale: >
  Directly addresses Q1 (attribution of lice to aquaculture) using the strongest possible natural
  experiment design — complete removal of aquaculture in a defined area with multi-year pre/post
  monitoring. The finding that lice infestations rebounded post-removal is high-value evidence for
  the corpus, particularly for evaluating the causal assumptions underlying the Norwegian Traffic
  Light System (TLS) which attributes wild salmon lice pressure primarily to farms.

transferability: medium
transferability_notes: >
  Pacific salmon species (chum, pink) differ from Norwegian Atlantic salmon and sea trout; coastal
  BC fjord systems differ from Norwegian fjord ecosystems. However, the fundamental question of
  farm vs. natural reservoir contribution to wild fish lice burden is directly analogous to the
  Norwegian situation. The natural experiment design and 8-year time series provide a methodological
  template of high relevance. Results suggest that the link between farm lice and wild fish infestation
  may be weaker than assumed in the Norwegian TLS framework.

# DEL E - RELASJONER OG KURATORKOMMENTARER
included_because: >
  This paper provides rare natural experiment evidence bearing directly on Q1 (attribution of lice to
  aquaculture sources). It is one of very few studies with a sufficiently long time series spanning
  both presence and complete absence of aquaculture in the same area. The finding of lice rebound
  post-removal fills a critical gap in the corpus by challenging the farm-attribution assumption
  that is central to the Norwegian TLS. It should be read alongside its companion paper in Diseases
  of Aquatic Organisms (DAO) covering the Broughton Archipelago.

