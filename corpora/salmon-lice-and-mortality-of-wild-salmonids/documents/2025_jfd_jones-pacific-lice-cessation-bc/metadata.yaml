rag_summary: >
  Jones, Revie and Stewardson (2025) report a longitudinal natural experiment in the Discovery Islands (DI),
  British Columbia, Canada, examining sea lice infestations on juvenile chum and pink salmon (n=5,967) from
  2017 to 2024, spanning the full removal of 15 Atlantic salmon aquaculture facilities between 2020 and 2022.
  The study found that despite zero Atlantic salmon aquaculture production since 2022, sea lice infestations
  (L. salmonis and C. clemensi) persisted and rebounded in 2024 to levels similar to or exceeding those
  measured in pre-removal years (2017-2019). Specifically, lice prevalence on pink salmon in 2024 exceeded
  all years measured in 2017-2019, and mean abundance on chum salmon returned to above 2017-2018 levels.
  The paper directly challenges an earlier claim (Routledge and Morton 2023) that a 96% decline in sea lice
  in 2020-2022 was attributable to aquaculture removal, arguing instead that natural reservoir hosts and
  environmental variability are primary drivers. The key limitation is the absence of reservoir host sampling
  to quantify non-farm lice sources, and only two post-removal years are available (2023-2024).

