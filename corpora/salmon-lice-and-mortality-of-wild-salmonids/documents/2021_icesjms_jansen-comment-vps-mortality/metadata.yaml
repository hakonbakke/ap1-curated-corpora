key_claims:
  - "N=7929 trawled post-smolts (2017-2020 NMDC); excluded 339 tagged, 326 scale-loss (mean lice 1.9 vs 3.05 without)"
  - "Same mortality formula as Johnsen et al.: NB dispersion 0.3695, ×0.6 harmful lice, 20 g fish; >6=100%, 4-6=50%, 2-3=20%, 0-1=0%"
  - "VPS mortality higher than trawl in 26/27 area-year comparisons (Figure 1); especially when trawl mortality low"
  - "Table 2 mortality classes: trawl 4 high / 5 medium / 18 low vs VPS 13 / 8 / 6 — χ²(2,N=54)=11.46, p=0.003"
  - "Example Table 1: MA4-1 2017 trawl M=52.8% (N=187, LPS=26.2) vs VPS mean 59.5% (range 49-64%); MA5 2017 trawl 6.0% vs VPS 24.7%"
  - "Supplementary RD adjustment: 11/27 area-years significant lice increase toward ocean; still VPS overestimates 22/27, χ² p=0.023"
  - "Johnsen 2019 VPS predictions (>30%: 82 rivers) drove mandatory production cuts in MAs 4 and 5"
  - "Contradicts Johnsen conclusion that modelled and observed lice levels 'coincide'"

claims_about_uncertainty:
  - "Cannot identify which sub-model causes bias given model-chain complexity"
  - "Trawl fish origin assumption supported by genetics (Harvey 2019) and VPS fjord-index migration rules"

claims_about_policy_or_management:
  - "Systematic VPS overestimation has direct TLS consequences (6% production reduction in red areas)"
  - "TLS uses deterministic mortality from lice counts — validation should match trawl-based mortality"

methodological_limitations:
  - "Mean VPS mortality across rivers may not match trawl catch composition"
  - "RD supplementary analysis partially addresses post-trawl infestation pathway"

rag_summary: >
  Jansen & Gjerde (2021, ICES JMS 78:3847-3851, open access) validate Johnsen et al. VPS model against
  NALO trawl data (N=7929, 2017-2020). VPS exceeds trawl mortality in 26/27 area-years; class counts
  differ significantly (p=0.003). After migration-distance adjustment, 22/27 still overestimated
  (p=0.023). Same Taranger thresholds and NB parameters as IMR paper. Authors: INAQ AS and Nofima.
  Critiques TLS-relevant claim that modelled and observed infestation coincide.

coi_declared: yes

coi_notes: >
  Peder A. Jansen (INAQ AS — private consultancy); Bjarne Gjerde (Nofima). No grant declared for
  this comment. Jansen co-developed the competing NVI virtual post-smolt framework (Kristoffersen et al.
  2018) and later extended critique (Jansen et al. 2025). Industry-linked consultancy affiliation is
  material for interpreting TLS-critical commentary. Open access CC BY 4.0.

