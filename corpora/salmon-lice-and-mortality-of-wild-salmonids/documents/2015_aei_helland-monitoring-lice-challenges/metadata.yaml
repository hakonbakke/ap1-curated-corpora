# DEL D - SYNTESE OG PLASSERING I LITTERATUREN
consensus_signal: moderate_agreement
quality_signal: moderate
quality_rationale: >
  Well-designed statistical analysis of a large monitoring dataset with appropriate methods for
  zero-inflated count data. However, the observational design and measurement limitations (coarse
  temperature data, salinity proxy, trout as salmon proxy) limit causal inference. The paper is
  primarily methodological rather than providing new biological findings, and its value lies in
  systematically characterising the limits of the monitoring system.

controversy_role: methodological

relevance_signal: high
relevance_rationale: >
  Directly relevant to Q5 (model predictions of infestation) and Q10 (TLS robustness), by demonstrating
  that the monitoring data underpinning TLS decisions have substantial statistical limitations, including
  zero-inflation, overdispersion, and covariate measurement error that reduce detection power.

transferability: high
transferability_notes: >
  Based on coast-wide Norwegian monitoring data across 15 fjords, making it broadly applicable to the
  Norwegian context. Statistical challenges discussed are generic to parasite monitoring and apply beyond Norway.

# DEL E - RELASJONER OG KURATORKOMMENTARER
included_because: >
  This paper fills a critical methodological gap for Q5 and Q10 by providing a systematic analysis of
  the statistical and ecological challenges inherent in the Norwegian lice monitoring programme. It
  complements empirical effect papers (Bøhn et al. 2020, Fjelldal et al. 2020) by clarifying the
  uncertainty around detection and monitoring of the infestation levels that drive those effects.

