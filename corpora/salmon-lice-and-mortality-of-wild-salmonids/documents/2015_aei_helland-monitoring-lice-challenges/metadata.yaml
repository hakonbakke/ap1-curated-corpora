# DEL C - FUNN OG BEVIS
evidence_direction: supports_effect
effect_scale: population_level
uncertainty_emphasis: high
main_uncertainty_sources:
  - "Zero-inflation and overdispersion in lice count data reduce statistical power"
  - "Coarse spatial resolution of temperature data (county-level means)"
  - "Salinity measured only as river discharge proxy, not directly"
  - "Salmon migration timing uncertain — gill-net trout data used as proxy for salmon exposure"
  - "Uneven sampling effort across sites and years"
key_claims:
  - "Binary GLMM (N=4890 fish, 244 occasions, 52 fjord×year random groups): lice presence increases with fish length (+0.003 mm⁻¹), farm infestation pressure (+1.245 on standardized IP), temperature (+0.314), and decreases with freshwater influence (−134.1); T×IP interaction −0.075 (all p<0.001 except where noted)."
  - "Farm pressure remains significant after temperature correction—first Norwegian demonstration that aquaculture pressure elevates wild infestation probability with environmental covariates in the model."
  - "Proportional models (>0.025, >0.05, >0.1 lice g⁻¹ on trout <200 g, N=2250): temperature and freshwater effects robust; farm pressure significant only at 0.025 lice g⁻¹ threshold (p=0.016), not at 0.05 or 0.1."
  - "Monitoring 2004–2010: 4610 trout + 280 char, 41 sites, 15 fjords; 66% chalimus, 17% pre-adults, 16% adults; 99% L. salmonis; 39% zero lice, 9% one louse, max 586 fish⁻¹; ZINB models on counts failed to converge."
  - "Programme shifted after Helland et al. (2012) report: from 2013 fewer sites, fyke nets (live catch), four model fjords with richer environmental data."
claims_about_uncertainty:
  - "Monitoring programmes using standard count data may have insufficient statistical power to detect moderate changes in lice levels without large sample sizes"
  - "Choice of infestation measure (prevalence vs. abundance vs. intensity) affects conclusions — results are qualitatively consistent but quantitatively different"
  - "Coarse temperature data introduces measurement error that likely underestimates true temperature effects"
claims_about_policy_or_management:
  - "Monitoring data quality must be improved for use in management decisions, particularly for the Traffic Light System"
  - "Sampling designs should account for zero-inflation and overdispersion to ensure adequate statistical power"
  - "Inner-fjord 'control' sites protected from farming provide useful reference points but may still be affected by lice dispersal from outer fjord farms"
methodological_limitations:
  - "Gill-net mortality sampling—95% sea trout/char proxy for salmon post-smolt exposure; sites increased from 6 (2004) to 27 (2010) with uneven replication (7 sites >10 occasions)."
  - "Temperature: monthly county means from lusedata.no (lagged 1 month); salinity only river-discharge proxy without temporal variation."
  - "Farm IP: kernel density 40 km radius on mature female lice × reported farm fish (Jansen et al. 2012); inner–outer fjord gradients confound IP, temperature and salinity."
  - "Zero-inflated count models (ZIP/ZINB) did not converge for per-fish lice counts; proportional thresholds lose observations (N=159 occasions)."
  - "Cannot separate true vs false zeros (recent freshwater residency); observational design limits causality."

rag_summary: >
  Helland et al. (2015) model Norwegian national lice monitoring (gill nets, 2004–2010): 4890 fish, 244 occasions, 41 inner–outer fjord sites. A binary mixed model shows farm infestation pressure, temperature, length and freshwater proxy drive lice presence, with farm effect persisting after temperature adjustment and a negative temperature×pressure interaction (temperature matters most when farm pressure is low). Threshold-based proportional models on small trout (<200 g) link farm pressure only at 0.025 lice g⁻¹, not at 0.05–0.1. Extreme zero-inflation (39% uninfected; max 586 lice) prevents robust intensity modelling. Authors recommend fewer, deeper-sampled fjords and biologically meaningful thresholds—changes partly adopted in 2013 (fyke nets, model fjords). Open-access; funded by Norwegian Environment Agency, Food Safety Authority, Research Council, NINA and IMR.

