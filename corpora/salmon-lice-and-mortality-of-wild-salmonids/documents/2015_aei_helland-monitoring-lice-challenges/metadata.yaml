rag_summary: >
  Helland et al. (2015) analysed data from the Norwegian national salmon lice monitoring programme
  (2004-2010) comprising 4890 individual wild salmonids (95% sea trout) from gill-net sampling at
  41 sites in 15 Norwegian fjords. Using mixed-effects regression accounting for temperature, freshwater
  influence and fish body length, they found that farm infestation pressure (mean female lice per farmed
  fish x number of farmed fish) significantly increased lice infestation probability in wild salmonids
  even after controlling for environmental variables. A significant temperature x farm pressure interaction
  was detected: temperature effects are strongest when farm pressure is low, but diminish as farm pressure
  increases. The paper also systematically discusses the statistical challenges of monitoring — including
  zero-inflation, overdispersion, and measurement error in covariates — that reduce the power and
  reliability of the monitoring programme, with direct implications for the evidential basis of the
  Traffic Light System.

