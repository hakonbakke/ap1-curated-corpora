key_claims:
  - "TLS 'probably the most sophisticated salmon risk assessment in operation around the globe' — but not the only feasible approach"
  - "Reviewed >1000 pages from nearly 100 documents; 14 online meetings Nov 2020-Dec 2021; Interim Report July 2021"
  - "Figure 1: Taranger et al. (2011) mortality thresholds (orange oval) feed ALL sea lice impact indexes — single largest dependence among 7 assessment endpoints"
  - "Three model streams (IMR, NVI, SINTEF) state-of-the-art but calibration data variable/uncertain"
  - "Solid empirical basis for mortality thresholds NOT demonstrated; thresholds unchanged since TLS inception; ExpGrp 2019 subgroup found no basis to change"
  - "Uncertainty insufficiently quantified, propagated, and communicated; risk of over-confidence in complex models"
  - "Expert elicitation critical but poorly documented vs best practice; qualitative judgement in final green/yellow/red step"
  - "Sea trout/Arctic char outside EvalComm remit (Finstad method appendix cited, not peer-reviewed at evaluation time)"
  - "No TLS system performance / conservation effectiveness assessment undertaken"
  - "15 recommendations include R5-R6 (reassess thresholds, in situ studies), R7-R10 (sensitivity & IPCC-style uncertainty language), R14 external validation, R15 DPSIR iterative framework"

claims_about_uncertainty:
  - "Model precision can mask parameter uncertainty — confidence intervals recommended (R8)"
  - "Sensitivity to threshold values essential (R5)"

claims_about_policy_or_management:
  - "Present TLS honestly: precautionary system with embedded quantitative tools, not purely quantitative (R4)"
  - "Knowledge inclusion processes need documented frameworks (R1-R2)"

methodological_limitations:
  - "Selective 'key areas' review, not exhaustive audit of every TLS document"
  - "Sea trout/char indicators not evaluated"

rag_summary: >
  Eliasen et al. / EvalComm (2021, Research Council of Norway, ISBN 978-82-12-03918-6): eight
  international experts evaluate Norwegian TLS science. ~100 docs, 1000+ pages. Central finding:
  Taranger mortality thresholds lack solid empirical basis yet drive all impact indexes; uncertainty
  and expert elicitation under-documented; no performance monitoring. 15 recommendations (R1-R15);
  proposes DPSIR for iterative governance. Sea trout excluded from scope. Chair: Crawford Revie.

coi_declared: yes

coi_notes: >
  **Evaluation Committee** appointed by **Research Council of Norway** at request of **Ministry of
  Trade, Industry and Fisheries**. Eight scientists from Faroe Islands, Ireland, Denmark, UK, Finland
  — stated independent of Norwegian ExpGrp/SG. No industry funding declared. Not traditional peer review.

