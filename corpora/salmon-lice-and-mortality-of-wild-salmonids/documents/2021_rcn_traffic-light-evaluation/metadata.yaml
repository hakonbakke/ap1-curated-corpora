key_claims:
  - "The mortality thresholds used in the TLS lack a solid empirical basis and have not been reassessed since inception"
  - "Uncertainty quantification and propagation through the TLS is insufficient and not transparently reported"
  - "Expert elicitation processes are poorly documented and do not follow accepted best practice standards"
  - "The TLS should be framed within an iterative DPSIR process for ongoing performance review"

claims_about_uncertainty:
  - "Multiple places within the TLS contain uncertainty that is not formally quantified or propagated"
  - "The perception of advanced computational models can lead to misplaced over-confidence in results"

claims_about_policy_or_management:
  - "The TLS is probably the most sophisticated salmon risk assessment in operation globally"
  - "The TLS should adopt IPCC-style language for communicating uncertainty to non-scientific audiences"
  - "No assessment of TLS system performance or conservation effectiveness has been undertaken"

methodological_limitations:
  - "Review scope was selective rather than comprehensive"
  - "Sea trout and Arctic char assessment was deemed outside scope"

rag_summary: >
  Independent international evaluation of the Norwegian Traffic Light System (TLS) scientific basis,
  commissioned by the Research Council of Norway in 2021. Eight international scientists reviewed the
  modelling framework, mortality thresholds, uncertainty handling, and expert elicitation processes.
  Found that mortality thresholds lack empirical basis, uncertainty is insufficiently quantified and
  communicated, and expert judgment processes are poorly documented. Recommended DPSIR framework
  for iterative system review. Fifteen recommendations issued for improving transparency and reliability.

coi_declared: yes
coi_notes: >
  Committee members were independent international scientists with no direct involvement in the TLS.
  Appointed under the auspices of the Research Council of Norway at the request of the Ministry.

