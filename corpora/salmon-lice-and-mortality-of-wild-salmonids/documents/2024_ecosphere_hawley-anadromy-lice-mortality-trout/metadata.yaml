rag_summary: >
  Hawley et al. (2024) used N=8049 simulated individual migration trajectories of facultatively anadromous brown trout (sea trout), calibrated from empirical acoustic-telemetry tracking data (N=517 fish across 5 populations) in Sognefjorden, Norway (2013-2015). These trajectories were superimposed on open-access spatial-temporal modelled salmon lice (Lepeophtheirus salmonis) densities to estimate individual accumulated infestation and the fraction of total sea-sojourn mortality attributable to lice. Long-distance migrants entering the outer fjord (near aquaculture) had substantially higher lice-attributed mortality (smolts: 25.3%; veteran migrants: 14.8%) compared to inner-fjord fish (smolts: 14.7%; veterans: 1.7%), resulting in a population-level range of 3.3-34.3% lice-attributed mortality. The core finding is that individual variation in migration trajectory — not population-level average exposure — drives lice-induced mortality outcomes, making generic models inappropriate for facultatively anadromous species. The paper is limited by its reliance on modelled rather than directly measured lice densities, and on simulated rather than observed trajectories; mortality estimates are not validated against empirical survival data.

