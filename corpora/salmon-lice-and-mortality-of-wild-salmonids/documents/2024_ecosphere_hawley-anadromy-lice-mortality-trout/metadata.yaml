# DEL D - SYNTESE OG PLASSERING I LITTERATUREN
consensus_signal: moderate_agreement
quality_signal: strong
quality_rationale: >
  High-quality modelling study grounded in large-scale empirical telemetry data (N=517 individuals across multiple populations and years). Published in Ecosphere (ESA journal), open access, peer reviewed. Clear model structure with stated assumptions. The limitation that dose-response functions are borrowed from Atlantic salmon rather than brown trout is acknowledged. The lack of empirical mortality validation is an important caveat but is inherent to the approach. Overall the study design is rigorous and the analysis transparent.

controversy_role: supports_effect

relevance_signal: high
relevance_rationale: >
  Directly addresses Q4 (smolt/sea trout exposure via migration route), Q5 (modelled infestation on wild fish), Q7 (infestation-to-mortality translation), Q8 (fraction of smolts/migrants dying from lice), and Q9 (population-level impact). Unique because it quantifies the importance of INDIVIDUAL VARIATION in migration patterns — a key analytical gap for facultatively anadromous species excluded from Norway's TLS. Provides the framework for why brown trout require separate treatment in lice risk assessment.

transferability: medium
transferability_notes: >
  Study is geographically specific to Sognefjorden, which is unusually long (>200 km) and has a formally protected inner-fjord zone. Results quantifying heterogeneity in lice exposure due to individual migration behavior are likely transferable in principle, but specific mortality fractions depend on local farm distribution, fjord geometry, and population behavior. The modelling framework is broadly applicable to other fjord systems.

# DEL E - RELASJONER OG KURATORKOMMENTARER
included_because: >
  This is the most methodologically advanced paper in the corpus for estimating lice-induced mortality on brown trout. It explicitly models individual variation in migration as the primary driver of differential exposure — a key mechanistic insight with policy implications for whether and how sea trout should be included in the TLS. It fills the gap between generic lice exposure models (calibrated for Atlantic salmon) and the behavioral reality of facultatively anadromous brown trout.

