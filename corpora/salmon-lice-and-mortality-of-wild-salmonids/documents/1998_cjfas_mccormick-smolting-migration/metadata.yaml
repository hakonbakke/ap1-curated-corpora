key_claims:
  - "Smolting coordinates salinity tolerance (gill Na⁺,K⁺-ATPase, chloride cells), porphyropsin→rhodopsin shift, adult hemoglobins, buoyancy, loss of rheotaxis/territoriality, and schooling—primarily driven by photoperiod with temperature modulating pace."
  - "Physiological smolt window: retained smolts desmolt; gill Na⁺,K⁺-ATPase declines ~80% within ~400 degree-days after peak—window narrows in warmer water and with migration delays (e.g. dams)."
  - "Ecological smolt window: synchrony of migration timing with temperature, food and predators strongly affects adult returns; Fig. 3 simulation shows ~166 vs ~94 returns when peaks align vs shift 2 weeks."
  - "Migration initiation: increasing spring temperature (often ~10°C) and high discharge trigger descent; River Imsa smolt run timing correlated 91–95% with April–May warming (5.8–11.2°C start range)."
  - "Acid exposure as short as 12 h (pH 5.2, 31 µg L⁻¹ Al) can abolish smolt salinity tolerance; acid in May more damaging than April; Norwegian acid rivers showed ~10× lower adult returns vs limed sites."
  - "Hatchery smolt survival ~half wild (River Imsa); smolts more sensitive than parr to handling; mainstems/estuaries bear dams, pollution, acid—highest anthropogenic impact on the life cycle."
