rag_summary: >
  McCormick et al. (1998) review Atlantic salmon movements from fry emergence through smolt migration, emphasising coordinated physiology (GH, cortisol, thyroid hormones), morphology (silvering, streamlined form), and behaviour (downstream rheotaxis, schooling). The dual smolt-window framework separates a photoperiod-temperature limited physiological readiness period—after which ~400 degree-days erode gill Na⁺,K⁺-ATPase and salinity tolerance—from an ecological window where temperature, food and predators determine marine survival. Temperature and discharge act as releasing factors once fish are migration-ready; mistimed seawater entry or delayed passage (dams, acid, pollutants in mainstems/estuaries) elevates mortality. Acid and other stressors disproportionately hit smolts; hatchery fish often show poorer survival and timing. The review predates lice–aquaculture literature but explains why brief, synchronised coastal passage sets exposure risk for post-smolts in fjord systems (Q4).

