rag_summary: >
  McCormick et al. (1998) provide a comprehensive review of Atlantic salmon (Salmo salar) movement, migration, and smoltification biology, synthesising a large body of experimental and observational literature from freshwater life stages through the seawater transition. The review describes the dual smolt window concept: a physiological smolt window (a limited period of osmoregulatory readiness, regulated by photoperiod and temperature via the neuroendocrine system) and an ecological smolt window (the period when environmental conditions favor survival in seawater). Key physiological changes during smolting include increased salinity tolerance, altered hemoglobin and visual pigments, loss of positive rheotaxis, and initiation of schooling. Migration is triggered by temperature and water flow once physiological readiness is achieved. Smolt survival is critically dependent on the synchrony between physiological readiness and favorable ecological conditions at seawater entry. The paper does not address salmon lice directly but provides the foundational mechanistic basis for understanding why smolt migration timing, duration, and estuarine behavior determine the degree of lice exposure in coastal waters — making it a key reference for interpreting lice exposure models in Q4.

