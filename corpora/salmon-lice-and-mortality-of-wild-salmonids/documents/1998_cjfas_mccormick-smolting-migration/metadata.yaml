consensus_signal: strong_agreement
quality_signal: strong
quality_rationale: >
  Foundational review paper co-authored by four senior researchers representing leading institutions in Atlantic salmon biology. Published in Canadian Journal of Fisheries and Aquatic Sciences (Supplement 1), a high-quality peer-reviewed journal. The paper has been widely cited and is considered a standard reference for smolt biology. Quality reflects the state of knowledge as of 1997-1998; it does not cover subsequent developments in lice ecology or genomics, but the core physiology described remains valid.

controversy_role: neutral

relevance_signal: medium
relevance_rationale: >
  This paper is relevant to Q4 (smolt exposure to lice) by providing the mechanistic basis for understanding why smolt migration timing and physiology create windows of vulnerability to parasite exposure in coastal waters. The smolt window concept — both physiological and ecological — directly underpins why timing of seawater entry relative to lice density peaks matters for exposure risk. As a 1998 review, it does not address salmon lice directly, so its relevance is primarily as foundational mechanistic context rather than direct evidence.

transferability: high
transferability_notes: >
  The fundamental physiology and behavior of Atlantic salmon smolts described in this review is conserved across the species' range. The mechanisms governing smolt timing, physiological readiness, and migration behavior apply broadly to Norwegian populations, which are the focus of salmon lice management. The review's generality is an asset; population-specific timing details vary but the underlying biology is universal.

# DEL E - RELASJONER OG KURATORKOMMENTARER
included_because: >
  This foundational review provides the mechanistic basis for understanding why smolt migration timing and biology determine the degree of salmon lice exposure in coastal waters. It is essential background for interpreting exposure models (Q4, Q5) and for understanding why the timing and duration of the smolt migration window creates differential vulnerability among cohorts and populations. Without this biological context, lice exposure estimates lack mechanistic grounding.

