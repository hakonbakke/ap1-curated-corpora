rag_summary: >
  Jonsson, Jonsson and Albretsen (2016) present a 35-year time series analysis (1976-2010) of Atlantic
  salmon (Salmo salar) life-history traits from the River Imsa, south-western Norway. Wild 1SW salmon
  declined in mean total length from 63 to 54 cm, with a corresponding 40% decline in individual mass
  (2.0 to 1.2 kg) across cohorts migrating to sea over this period. The decline correlated negatively
  with near-surface temperatures in the eastern Norwegian Sea (the stock's main feeding area), and
  post-smolt growth was positively associated with marine survival. Hatchery fish from the same
  population showed identical trends from 1981 onwards, ruling out genetic change as the cause.
  The authors attribute the observed changes to large-scale ecosystem restructuring in the North
  Atlantic — including the collapse and rebuilding of pelagic fish stocks, declining zooplankton
  abundance, and climate-driven sea surface warming — concluding that Atlantic salmon life-history
  changes are primarily driven by shifts in the pelagic food web. This paper is relevant to Q9 in the
  corpus as it provides quantitative evidence that non-lice oceanographic and food-web factors drive
  large declines in Atlantic salmon marine survival, which is essential context for attributing
  population-level mortality to sea lice specifically.

