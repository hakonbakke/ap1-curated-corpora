rag_summary: >
  Jonsson, Jonsson and Albretsen (2016) analyse 35 years (1976–2010) of trap data from River Imsa, SW Norway, plus hatchery smolt releases from 1981. Wild 1SW adults shrank ~40% in mass (63→54 cm LT) while Norwegian Sea SST rose ~1°C; post-smolt growth and condition fell and correlated with survival and maturation strategy (%1SW). Hatchery cohorts track the same environmental trajectory (high r² for LT, K, %1SW), arguing against genetic drift. Temperature–size regressions are significant but explain limited variance; authors emphasise pelagic food-web change (mackerel/herring dynamics, zooplankton) as the primary driver. No lice or farm metrics—essential Q9 baseline showing large marine mortality and growth trends independent of aquaculture parasites.

