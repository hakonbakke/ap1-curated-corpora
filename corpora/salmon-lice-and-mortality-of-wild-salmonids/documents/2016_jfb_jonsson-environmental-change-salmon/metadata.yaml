# DEL D - SYNTESE OG PLASSERING I LITTERATUREN
consensus_signal: strong_agreement
quality_signal: strong
quality_rationale: >
  Exceptionally long (35-year) time series from a well-studied and intensively monitored Norwegian
  salmon river with both wild and hatchery fish for comparison. Methods are rigorous (standardised
  trapping, scale backcalculation, correlations with oceanographic data). The wild/hatchery
  concordance is particularly important in ruling out genetic drift as an explanation for the
  life-history changes, strengthening the causal inference for environmental drivers. Published in
  Journal of Fish Biology by leading Norwegian salmon researchers (NINA). Findings are broadly
  consistent with other long-term studies of Atlantic salmon marine survival in Norway and the
  North Atlantic.

controversy_role: neutral

relevance_signal: medium
relevance_rationale: >
  This paper does not directly address sea lice or aquaculture — it is primarily about oceanographic
  and food-web drivers of Atlantic salmon marine survival. However, it is highly relevant to Q9
  (population-level impacts) because it provides essential baseline context: major declines in
  Atlantic salmon condition and survival in Norway are attributable to North Atlantic ecosystem
  changes, independent of sea lice. This is critical for disentangling lice-attributed mortality
  from background oceanographic mortality when evaluating the TLS or other lice-based management
  frameworks.

transferability: high
transferability_notes: >
  This paper IS from Norway (River Imsa) and uses the precise species (Salmo salar) and geographic
  context (Norwegian Sea, North Atlantic) most relevant to the corpus. The findings are directly
  applicable to the Norwegian situation and provide authoritative local context for non-lice
  mortality factors. The authors (NINA and IMR) are leading Norwegian salmon science institutions,
  and the River Imsa is one of the best-monitored salmon rivers in Norway.

# DEL E - RELASJONER OG KURATORKOMMENTARER
included_because: >
  This paper fills a critical contextual role in the corpus by documenting the magnitude and
  oceanographic drivers of background marine mortality in Norwegian Atlantic salmon, independent
  of sea lice. A 40% decline in individual salmon mass over 35 years — attributable primarily to
  North Atlantic food-web restructuring — is essential context for evaluating claims about
  lice-induced mortality at the population level (Q9). Without this context, population declines
  may be incorrectly attributed to lice when large-scale oceanographic changes are the primary
  driver. The Norwegian authorship and River Imsa long-term dataset make this particularly
  authoritative for the corpus.

