key_claims:
  - "Review (raq.12953) peer-reviewed with five reviewers; Stige et al. claims of bias and 'misunderstanding' are not scientifically justified"
  - "TLS migration timing uses 25% emigration criterion + fixed 40-day period (Vollset et al. 2021; EG reports 2017, 2022) — acoustic telemetry in review (earlier, shorter migration) not incorporated into TLS estimates"
  - "Calibration compensation fails if both larvae-production inputs and observational calibration data are unreliable — uncertainties do not cancel"
  - "Review explicitly discusses calibration uncertainty; contradicts Stige claim it 'fails to mention' scaling"
  - "Post-attachment lice loss: EG recently added 40% correction to NVI model acknowledging need, but 5 of 7 TLS mortality endpoints still assume 100% lice survival after attachment"
  - "Findings align with Eliasen et al. (2021) Evaluation Committee and EG's own annual reports on migration-timing uncertainty"
  - "All COI disclosed in publication process; Stige allegation of hidden conflicts is unwarranted"
claims_about_uncertainty:
  - "Migration timing/duration is key TLS unreliability source — acknowledged in EG reports and Vollset et al. (2021) basis paper"
  - "EG reports describe calibration data variability impairing model product quality (Eliasen et al. 2021)"
claims_about_policy_or_management:
  - "Current TLS practice contributes to overestimation of lice-induced smolt mortality until post-attachment loss applied consistently across all assessment endpoints"
methodological_limitations:
  - "Two-page letter — limited technical depth"
  - "Authors affiliated with Marine Prospects, Akvaplan-niva, DFO — industry/regional critique context"
rag_summary: >
  Van Nes, Imsland & Jones (2025, Rev Aquacult e70050) reply to Stige et al. (e70040). Defend
  raq.12953 review: TLS migration model excludes acoustic telemetry showing earlier/shorter migration;
  unreliable inputs plus unreliable calibration negate scaling argument; 40% NVI correction vs
  100% survival assumption on five other endpoints. Cite Eliasen (2021) and EG reports as supporting
  original critique. Reject bias/COI allegations.
coi_declared: yes
coi_notes: >
  van Nes (Marine Prospects AS); Imsland (Akvaplan-niva, UiB); Jones (DFO Canada). Same disclosure
  context as Van Nes et al. (2024) — Salmon Tracking 2030 industry funding and Nova Sea board
  noted in Stige comment, disputed here as fully disclosed in review publication process.
