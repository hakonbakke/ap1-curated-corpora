rag_summary: >
  Jones, Revie and Stewardson (2025) report a 9-year time series (2016-2024) of sea lice infestations
  on juvenile chum and pink salmon (n=2,868) from 14 fixed beach seine sites in the Broughton Archipelago
  (BA), British Columbia — a region where Atlantic salmon aquaculture declined from 21,645 metric tonnes
  in 17 facilities (2019) to 614 t in 2 facilities (2024). The study covers three distinct phases:
  extensive aquaculture (2016-2018), phased removal (2019-2023), and near-complete removal (2024).
  The key finding is that in 2024, prevalence of both L. salmonis and C. clemensi on chum and pink
  salmon increased to 40.7% and 40.3% respectively — levels similar to or exceeding values from the
  full-aquaculture period (2016-2021). This directly contradicts the assumption that aquaculture is
  the primary source of sea lice infestations on wild juvenile Pacific salmon in the BA. The paper
  attributes the persistent infestations to natural reservoir hosts and argues for better quantification
  of non-farm lice sources. Key limitations are the lack of statistical modelling and absence of
  reservoir host sampling.

coi_declared: yes
coi_notes: >
  No external funding for this work is declared. Data were compiled partly from industry monitoring
  datasets (Mowi and Cermaq public sustainability reporting). Simon R. M. Jones is affiliated with
  Fisheries and Oceans Canada; Crawford W. Revie with University of Strathclyde; Lance Stewardson
  (corresponding author) with Mainstream Biological Consulting (private sector). Use of industry
  monitoring data may introduce data provenance considerations, although the paper is published in
  a peer-reviewed journal and methodology is described in detail.

# DEL D - SYNTESE OG PLASSERING I LITTERATUREN
consensus_signal: contested
quality_signal: moderate
quality_rationale: >
  Strong study design as a natural experiment with the longest available before/during/after time
  series for the Broughton Archipelago (9 years, 14 fixed sites). However, the study is descriptive
  with no formal statistical modelling, relies partly on industry monitoring data, and lacks reservoir
  host sampling. The reduction in sample size per site from 2019 onwards slightly weakens the
  post-removal comparisons. The Broughton Archipelago is the most thoroughly studied sea lice system
  in BC, making this high-value evidence despite these limitations.

controversy_role: challenges_effect

relevance_signal: high
relevance_rationale: >
  The Broughton Archipelago is the most extensively studied sea lice system in British Columbia,
  and has been central to the international debate about aquaculture impacts on wild salmon for
  over two decades. A finding of unchanged lice infestations after near-total aquaculture removal
  in this area — with a 9-year time series — is among the strongest available natural experiment
  evidence challenging the farm-attribution assumption central to both Canadian management and,
  by analogy, the Norwegian TLS.

transferability: medium
transferability_notes: >
  Results are directly applicable to the attribution question (Q1) in any salmon-aquaculture
  management context, including Norway. The Broughton Archipelago system has closer ecological
  similarities to Norwegian fjords (fjordic coastline, multiple farm sites, anadromous salmonids)
  than many other Pacific systems. However, the host species (chum, pink salmon) differ from
  Norwegian Atlantic salmon and sea trout, and natural reservoir communities differ. The lesson
  about the importance of natural reservoirs in driving wild fish lice infestations is potentially
  highly transferable to Norwegian context.

# DEL E - RELASJONER OG KURATORKOMMENTARER
included_because: >
  This paper fills the same critical gap as its companion Discovery Islands paper (Jones et al. 2025,
  JFD) but in the Broughton Archipelago — the site of the most intensive and long-running sea lice
  research in BC. Together, these two papers represent the first multi-region natural experiment
  evidence from BC challenging the farm-attribution assumption at the heart of Q1. The Broughton
  Archipelago dataset extending back to 2016 (with comparisons to older DFO data from 2004-2009)
  makes this particularly valuable. The paper also explicitly engages with recent evidence from
  van Nes et al. (2025) and Jeong et al. (2025).

