key_claims:
  - "Dataset covers approximately 100 Atlantic salmon farms and over 365,000 wild fish observations across 7 DFO fish health sub-zones in BC, spanning 22 years (2001–2023)."
  - "Sea lice levels show substantial spatial and temporal variation across zones; an unusual spike occurred across most zones in 2015, attributed to the Pacific 'warm blob'."
  - "The dataset enables analysis of regulatory impacts, including the effect of farm closures in the Discovery Islands and Broughton Archipelago since 2021."

claims_about_uncertainty:
  - "Sampling protocols, species identification standards, and temporal coverage differ across contributing programmes, limiting direct comparisons across years and zones."

claims_about_policy_or_management:
  - "The dataset documents a rare natural experiment: farm closures in 2021 allow analysis of the effect of removing farm lice sources on wild fish infestation levels."

methodological_limitations:
  - "Heterogeneity in sampling protocols across programmes and time periods limits direct comparison."
  - "No causal analysis performed — the paper describes and releases data only."

rag_summary: >
  Revie et al. (2025) describe a large, publicly available longitudinal dataset
  of sea lice infestation on wild Pacific salmonids and farmed Atlantic salmon
  along the coast of British Columbia, Canada, spanning 2001 to 2023. The dataset
  covers approximately 100 farms and over 365,000 wild fish observations across
  seven DFO fish health sub-zones, collected by multiple monitoring programmes
  using both lethal and non-lethal sampling protocols. Infestation levels show
  marked spatial and temporal variation. The paper does not analyse causal links
  between farm and wild lice, but provides the empirical infrastructure for such
  analyses. A key limitation is heterogeneity in sampling protocols across
  programmes and time periods.

