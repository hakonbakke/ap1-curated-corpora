included_because: >
  Provides the largest publicly available long-term dataset linking sea lice on Atlantic salmon farms to infestation of wild Pacific salmonids on the BC coast. Important as a methodological reference for monitoring design and as empirical context for the debate on farm-to-wild lice transmission. Complements Norwegian monitoring data with a Pacific perspective.

