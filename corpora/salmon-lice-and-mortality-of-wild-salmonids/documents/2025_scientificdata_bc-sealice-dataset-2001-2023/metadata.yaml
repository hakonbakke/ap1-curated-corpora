key_claims:
  - "Five CSV files on figshare (doi:10.6084/m9.figshare.28078100): 16,920 wild sampling events; 376,764 assessed wild fish rows; 96 farm facility records; 10,159 monthly farm abundance records; 1,527 zone median load records"
  - "~10,000 mean monthly farm abundance estimates from ~100 farms; ~1M wild fish caught but protocol caps mean only ~25% assessed for lice"
  - "Wild sampling: 12,465 events with fish (25% of events caught zero target fish); chum+pink = 93% of 376,764 fish; >90% of events April–June"
  - "Ten source programmes (SCS, MK, Hak, Kit, DFO, BAMP, MERP, MBC, Pacif, etc.) with lethal vs non-lethal vs mixed protocols; early years poor copepodid/chalimus species ID"
  - "28% of assessed wild fish had any sea louse; ~1% had >10 lice; median wild fish length 47 mm"
  - "Farm monitoring: 40–60 fish/week, 2–3 pens; motile lice identified to species; chalimus grouped; weighted zonal means in Table 2 (March–June L. salmonis motile)"
  - "2015 coast-wide elevated farm motile lice (warm blob) in all zones except 2.3 and 3.1; farm event counts declined in 3.2 (Discovery Islands) and 3.3 (Broughton) from ~2021/2022 after policy-driven farm reductions"
  - "Dataset created to counter small-scale/anecdotal claims about BC coast; supports policy analysis of farm closure effects"

claims_about_uncertainty:
  - "DFO public data switched monthly→weekly means (2013) and farm-level→pen-level reporting — reduces strict long-term comparability"
  - "Commercial sensitivity prevents disclosure of farm-level inventories; zone load uses median of farm abundance × unreported inventory"
  - "Non-lethal field protocols under-resolve chalimus to species; pre-2014 chalimus stage nomenclature updated to two-stage system"

claims_about_policy_or_management:
  - "Explicit use case: evaluating impacts of Canadian government reductions in salmon farms (Discovery Islands, Broughton Archipelago)"
  - "Table 2 weighted March–June motile L. salmonis abundances align with DFO sensitive-period regulations for wild juvenile migration"

methodological_limitations:
  - "Data descriptor only — no causal farm-to-wild transmission analysis"
  - "Wild programmes differ in spatial coverage (e.g. SCS/MK concentrated in 3.3; CC limited 2018–2021 in 2.3)"
  - "2003 anomalous species mix due to different DFO protocol that year"
  - "No individual fish migration, physiology or mortality outcomes"

rag_summary: >
  Crawford et al. (2025, Sci Data, s41597-025-05653-x) release harmonised BC coast sea lice data
  (2001–2023): 16,920 wild events, 376,764 fish assessments, 96 farms, 10,159 monthly farm records.
  Seven DFO sub-zones; chum/pink dominate wild samples; 28% of fish infested. Documents protocol
  heterogeneity (lethal lab ID vs non-lethal field), 2015 warm-blob farm lice peak, and post-2021
  monitoring decline where farms were removed. figshare + GitHub (modailmara/BCSalmonData). Stewardson
  (Mainstream Biological Consulting) co-author — industry-linked wild sampling context.

coi_declared: no
coi_notes: >
  No competing interest declared in paper. Stewardson operates Mainstream Biological Consulting and
  conducts industry-associated wild juvenile lice monitoring in BC (see also Jones et al. 2025 JFD).

# DEL D — SYNTESE
consensus_signal: high_agreement
quality_signal: medium
quality_rationale: >
  Authoritative long-term harmonisation of fragmented BC monitoring with documented field schemas
  and validation (Table 6 size seasonality vs Jones & Hargreaves 2007). Value is breadth and
  reproducibility, not causal inference. Heterogeneity limits simple trend conclusions.

controversy_role: foundational
relevance_signal: medium
relevance_rationale: >
  Largest open BC farm–wild lice dataset — enables Q1 attribution studies and Q5 pressure-model
  validation at coast-wide scale. Indirect but methodologically informative for Norwegian TLS
  monitoring debates.

transferability: medium
transferability_notes: >
  Pacific hosts and Canadian regulation differ from Norway, but harmonisation approach, weighted
  zonal farm metrics, and protocol-documentation lessons transfer to multi-source lice monitoring design.

# DEL E — RELASJONER
included_because: >
  Foundational empirical resource for BC farm–wild lice patterns over two decades, including periods
  before and after major aquaculture removals — supports corpus Q1/Q5 with data rather than small
  single-region studies.

