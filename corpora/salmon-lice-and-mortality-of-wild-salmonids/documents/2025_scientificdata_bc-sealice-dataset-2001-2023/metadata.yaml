key_claims:
  - "The dataset covers ~10,000 mean monthly sea lice estimates from almost 100 salmon farms across seven BC fish health sub-zones spanning 2001–2023."
  - "Wild fish data cover over 365,000 individual host observations from ~17,000 sampling events."
  - "Temporal coverage varies by zone; recent policy changes (Discovery Islands, Broughton Archipelago) led to declines in farm-level monitoring from 2021/2022 onward."
  - "Early wild fish data have limited sea lice species resolution; field-observed fish less detailed than lethally sampled fish."

claims_about_uncertainty:
  - "Species identification of lice was limited in early monitoring years, particularly for copepodites and chalimus."
  - "Changes in reporting format over time (monthly vs. weekly averages, farm-level vs. pen-level) reduce long-term comparability."

claims_about_policy_or_management:
  - "Recent government policy has led to significant reductions in salmon farms in at least two zones (Discovery Islands, Broughton Archipelago), whose effects can be studied using this dataset."
  - "The dataset can support evidence-based policy on lice risk management on the BC coast."

methodological_limitations:
  - "Wild fish sampling design is not standardised across zones or time, limiting direct spatial and temporal comparisons."
  - "The dataset does not include individual-level physiological data, migration tracking, or mortality outcomes."

rag_summary: >
  Crawford et al. (2025) describe a publicly released dataset of sea lice infestation records from Atlantic salmon farms and wild Pacific salmonids along the British Columbia (BC) coast, spanning 2001–2023. The dataset comprises ~10,000 mean monthly lice estimates from ~100 farms and ~365,000 individual wild fish observations across seven fish health sub-zones. Data quality varies over time due to changes in monitoring protocols and species identification capabilities. The dataset enables long-term analysis of spatial and temporal patterns, including the consequences of farm closures in the Discovery Islands and Broughton Archipelago following policy changes from ~2021. It is a valuable empirical foundation for evaluating the relationship between farm-origin lice and wild salmonid infestation on the Pacific coast.

