key_claims:
  - "VPS model: ~10% post-smolt mortality ≈ 0.3 million spring adult female lice (weeks 16–21 average, 19 farms, 2012–2022); Nordfjord recent average ~20% (~2× green-light target)"
  - "Zonation hindcast (2015–2022): mean adult females −12% (1.36→1.20 M), treatments −11% (8.5→7.6% cages/week); spring odd years 0.54→0.06 M but even years 0.73→1.06 M"
  - "Week 15 coordinated 98% treatment: spring lice −66% to 0.37 M (still above 0.3 M goal); week 12 98% + 0.1 threshold: 0.42 M spring, 0.34 M weeks 13–39"
  - "Stock 1 kg: spring even-year lice −75% to 0.27 M (below goal); closed half of farms: −63% to 0.40 M; skirt all −29% to 0.84 M — insufficient alone"
  - "89% of infestation pressure originated within study area; simulated lice counts averaged 17% above reported historic data"

claims_about_uncertainty:
  - "90% simulation intervals reflect stochasticity in lice dynamics and, for closed-cage scenarios, random farm subset selection."
  - "Authors did not optimise alternative zonation schemes; conclusions apply to one regionally proposed plan."

claims_about_policy_or_management:
  - "TLS green light (<10% modelled post-smolt mortality) requires roughly halving spring adult female lice in Nordfjord; larger reductions may be needed elsewhere in western Norway (PA4 ~30%)."
  - "Regional coordination of production cycles without complementary density-reduction measures may alternate between low impact in odd years and unacceptable impact in even years."
  - "Stocking larger smolts, closed containment on a substantial share of farms, or downscaling open-cage biomass are the simulated paths to sustained acceptable lice levels for wild salmon."

methodological_limitations:
  - "Single case study (19 farm locations, Nordfjord / PA4); hindcast counterfactuals, not a field experiment."
  - "VPS mortality estimates inherit calibration uncertainties documented in Stige et al. (2022)."
  - "Treatment resistance, fish welfare costs of frequent treatments, and economic feasibility only discussed qualitatively."

rag_summary: >
  Stige et al. (2024) use farm-reported lice and production data (2015–2022) from 19 locations in
  and around Nordfjord, Norway, with the NVI virtual post-smolt model and Aldrin et al. farm lice
  dynamics model to test how regional coordination of louse control could meet Traffic Light System
  goals. Modelled post-smolt mortality has averaged ~20%, so spring adult female lice must be halved
  (~0.3 million) for green-light levels. Coordinated production/fallowing (zonation) lowered mean lice
  and treatments but increased year-to-year spring variability, with unacceptably high lice when many
  farms are in their second production year. Skirts, lower thresholds, and coordinated spring treatments
  alone were insufficient in even years; only reduced open-cage salmonid density (≥1 kg stocking,
  closed systems on many farms, or fewer fish) achieved sustained acceptable spring lice. Open access.

