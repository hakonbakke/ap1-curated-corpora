# DEL D — SYNTESE OG PLASSERING I LITTERATUREN
consensus_signal: moderate_agreement

quality_signal: strong

quality_rationale: >
  Integrates two established modelling frameworks with eight years of mandatory farm reporting data;
  systematic scenario matrix; peer-reviewed; open access. Case-study scope and reliance on VPS
  mortality estimates limit generalisability.

controversy_role: practical_implications

relevance_signal: high

relevance_rationale: >
  Directly addresses how Norway can operationalise TLS mortality targets through coordinated farm
  management in a high-impact fjord. Complements Stige (2022) on model sensitivity and Jansen et al.
  (2025) on population returns by quantifying which control bundles actually reach <10% mortality.

transferability: medium

transferability_notes: >
  Scenario logic applies to other Norwegian production areas with similar farm density and TLS
  assessments; quantitative thresholds are Nordfjord-specific.

# DEL E — RELASJONER OG KURATORKOMMENTARER
included_because: >
  Sixteenth selected paper: management-focused hindcast linking farm lice coordination strategies to
  TLS wild post-smolt mortality targets in a major western Norwegian fjord. Fills gap between TLS
  model critique/calibration papers and population-return evidence by testing feasible control scenarios.

