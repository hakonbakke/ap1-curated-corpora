rag_summary: >
  First study linking parasite-induced mortality (PIM) estimates from the TLS to observations of
  adult salmon returning to 104 Norwegian rivers (2019-2024). Found significant negative effect of
  PIM on 1SW salmon returns (p<0.0005), with proportion of small salmon declining from 60% to <20%
  in high-PIM rivers. Predicts 10% reduction in returns at PIM ~5.5%. Over 70% of river-years exceed
  this threshold. Results support TLS model outcomes and suggest substantial reductions in farm lice
  are needed to meet the Norwegian Government's <10% mortality goal. Size-dependent effects suggest
  lice may also delay maturation in surviving fish.

