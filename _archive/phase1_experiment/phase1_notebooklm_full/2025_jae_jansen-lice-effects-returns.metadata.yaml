# DEL D — SYNTESE OG PLASSERING I LITTERATUREN
# [CLAUDE — BØR VERIFISERES AV FAGPERSON]
consensus_signal: moderate_agreement
quality_signal: strong
quality_rationale: >
  Large dataset (104 rivers, 396 river-years, 2019-2024). Peer-reviewed in high-impact
  ecology journal. Transparent methodology with extensive sensitivity analyses in supplements.
  Main limitation is correlational design and sea-age classification from weight.

controversy_role: bridge_between_positions
relevance_signal: high
relevance_rationale: >
  Bridges the gap between theoretical PIM and observed population effects — the key missing
  link identified by the Evaluation Committee. Notably, the first author previously critiqued
  the VPS model (Jansen & Gjerde 2021) but here finds population-level evidence supporting
  the TLS mortality estimates.

transferability: medium
transferability_notes: >
  Methodology applicable wherever PIM estimates and returning salmon data exist.
  Specific quantitative relationships are calibrated to Norwegian conditions.

# DEL E — RELASJONER OG KURATORKOMMENTARER
# [CLAUDE — BØR VERIFISERES AV FAGPERSON]
included_because: >
  First population-level study linking TLS mortality estimates to actual adult salmon returns,
  directly responding to the Evaluation Committee's recommendation for in situ population-level
  evidence. Unique because the first author previously critiqued the VPS model but here finds
  supporting evidence at the population level.

