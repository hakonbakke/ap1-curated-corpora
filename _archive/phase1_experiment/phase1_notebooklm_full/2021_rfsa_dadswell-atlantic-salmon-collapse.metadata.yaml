included_because: >
  Provides the strongest counter-argument in the corpus to the claim that salmon lice from aquaculture is the primary driver of Atlantic salmon population decline. The IUU hypothesis is empirically grounded in historical fishing data and the spatial pattern of collapse. Including this review is essential for the corpus to represent the genuine uncertainty around Q9 (population-level impact).

