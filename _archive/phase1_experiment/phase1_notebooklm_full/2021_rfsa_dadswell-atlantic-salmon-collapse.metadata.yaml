# DEL D — SYNTESE
# [CLAUDE — BØR VERIFISERES AV FAGPERSON]
# ======================================================================

consensus_signal: contested

quality_signal: medium

quality_rationale: >
  The review is wide-ranging and engages seriously with the existing literature. The IUU hypothesis is novel and builds on documented historical patterns in high-seas fisheries. However, the paper does not present new primary data; it reinterprets existing evidence, and the IUU hypothesis is difficult to test empirically. The review may underweight evidence from Norwegian, Irish, and Scottish studies showing local lice effects. The argument is internally coherent but would be strengthened by quantitative modelling of IUU mortality.

controversy_role: critical

relevance_signal: high

relevance_rationale: >
  Directly relevant to Q9 (population-level impact): argues that salmon lice and aquaculture are not the primary cause of the population-level decline, and that the real driver operates elsewhere in the life cycle. This is a significant counter-position in the corpus that should be weighed against studies supporting the primacy of lice-induced mortality.

transferability: medium

transferability_notes: >
  The North Atlantic-wide scope includes Norwegian stocks, but the IUU hypothesis applies primarily to stocks that spend extended time in the open ocean far from farms. Rivers with high aquaculture exposure (e.g. in Norway and British Columbia) may have different dominant mortality drivers than those studied here.


