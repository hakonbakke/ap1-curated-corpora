key_claims:
  - "The widespread decline of Atlantic salmon cannot be explained by local freshwater impacts, climate change, salmon farming, food availability, or marine predators alone — stocks in pristine, remote watersheds with no salmon farming have also collapsed."
  - "The pattern of collapse (loss of cyclic abundance, flatline of returns, reduced adult size, collapse first in watersheds distant from the North Atlantic Subpolar Gyre) is consistent with illegal, unreported, and unregulated (IUU) high-seas fisheries as the primary cause."
  - "Enhancement programs, commercial fishery closures, and angling restrictions have all failed to halt the decline, suggesting the cause is operating in the marine phase."
  - "Marine prey fields are diverse and historical high-seas fisheries data suggest IUU exploitation is a viable and historically documented mortality source."

claims_about_uncertainty:
  - "Attribution of Atlantic salmon decline to any single cause remains highly contested; the authors argue current dominant hypotheses (lice, climate, predation) are inconsistent with the full pattern of observations."
  - "Lack of surveillance outside EEZs makes IUU estimation extremely difficult."

claims_about_policy_or_management:
  - "Current regulatory approaches focusing on freshwater habitat, fishing restrictions, and aquaculture management may be addressing secondary rather than primary causes."
  - "International surveillance of high-seas fisheries targeting Atlantic salmon should be prioritised."

methodological_limitations:
  - "The IUU hypothesis is based on indirect evidence; direct quantification of IUU-origin mortality is not feasible with available data."
  - "The review selectively interprets existing literature to build a case for IUU; counter-evidence on salmon lice and aquaculture impacts is acknowledged but de-emphasised."

rag_summary: >
  Dadswell et al. (2021) review the causes of the widespread decline and impending collapse of Atlantic salmon populations across the North Atlantic since 1985. The review challenges dominant hypotheses — climate change, salmon farming and sea lice, food availability, and marine predators — on the grounds that stocks remote from farms and in pristine watersheds have also collapsed. The authors instead propose that illegal, unreported, and unregulated (IUU) high-seas fisheries are the primary cause, citing evidence from the spatial pattern of collapse (earliest near the North Atlantic Subpolar Gyre), loss of cyclic abundance patterns, and the documented history of high-seas fisheries. This constitutes a strong counter-position to the view that salmon lice from aquaculture is the dominant driver of Atlantic salmon decline.

coi_declared: no

coi_notes: >
  No competing interest declared. Authors are from Canadian (Acadia University, University of New Brunswick) and European (Marine Institute Ireland, University of Glasgow) academic institutions. No aquaculture industry affiliation stated.


