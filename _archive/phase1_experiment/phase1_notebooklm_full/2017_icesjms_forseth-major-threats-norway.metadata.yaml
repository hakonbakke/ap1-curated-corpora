  Authors are from Norwegian Institute for Nature Research (NINA), Uni Research, Institute of Marine Research (IMR), Norwegian Institute for Water Research (NIVA), Norwegian Veterinary Institute, UiT, and University of Oslo. These institutions form the core of the Norwegian Atlantic Salmon Committee. No industry funding declared. Open access article.


