key_claims:
  - "Escaped farmed salmon is ranked as the single largest current threat to Norwegian Atlantic salmon populations, classified as an 'expanding population threat'."
  - "Salmon lice from fish farms is ranked as the second largest threat, also classified as an 'expanding population threat' — meaning it may cause populations to become critically endangered or lost, with a high likelihood of further expansion."
  - "Both escaped farmed salmon and salmon lice affect populations to the extent that they may be critically endangered or lost, unlike other threats that cause reduction in adult returns but not population viability threats."
  - "Gyrodactylus salaris, freshwater acidification, and hydropower regulation are classified as 'stabilized population threats' — formerly major causes of decline but now managed."
  - "Overexploitation is no longer considered an important impact factor following introduction of conservation limits and fishing restrictions."

claims_about_uncertainty:
  - "The 2D classification system involves expert judgment and is semi-quantitative; exact placement of threats involves uncertainty."
  - "The relative ranking of escaped salmon vs. salmon lice as the top threats reflects scientific consensus of the Norwegian Atlantic Salmon Committee, not formal meta-analysis."

claims_about_policy_or_management:
  - "The classification system is designed to support prioritisation of management measures and can be used as a template for other countries."
  - "Salmon lice and escaped farmed salmon must be managed at national scale to prevent further population losses."
  - "The Traffic Light System and related regulatory instruments are relevant management responses to the lice threat."

methodological_limitations:
  - "Semi-quantitative scoring involves expert elicitation; different expert panels may reach different rankings."
  - "The classification focuses on Norwegian populations; ranking may differ for other North Atlantic regions."

rag_summary: >
  Forseth et al. (2017) developed a semi-quantitative 2D classification system to rank 15 anthropogenic threat factors to Norwegian Atlantic salmon populations. Escaped farmed salmon was identified as the largest current threat, followed by salmon lice from aquaculture — both classified as 'expanding population threats' capable of causing populations to become critically endangered or lost. Gyrodactylus salaris, acidification, and hydropower were ranked as 'stabilized threats'. The paper provides the authoritative Norwegian scientific consensus on the relative importance of aquaculture-related threats to wild Atlantic salmon, and serves as the foundational reference for the claim that salmon farming poses an existential risk to some Norwegian salmon populations.

