consensus_signal: high_agreement

quality_signal: strong

quality_rationale: >
  The paper represents the formal scientific consensus of Norway's national advisory body for Atlantic salmon management (Vitenskapelig råd for lakseforvaltning). The 2D classification framework is transparent, replicable, and has since been applied in other countries (e.g. Gillson et al. 2022 for England). As a review and expert assessment it does not provide new empirical data, but synthesises the best available evidence and professional judgment across all relevant threat categories.

controversy_role: foundational

relevance_signal: high

relevance_rationale: >
  Directly relevant to Q9 (population-level impact: how does lice-induced mortality compare to other sources of marine mortality?) and Q10 (robustness of the regulatory framework). This paper establishes the authoritative Norwegian scientific position that salmon lice from farms are an 'expanding population threat', providing the policy context for the Traffic Light System and related regulatory interventions.

transferability: medium

transferability_notes: >
  Focused on Norwegian populations and threat context. The classification methodology has been adopted internationally (see Gillson et al. 2022), but the specific ranking of threats reflects Norwegian aquaculture density and management context. Countries with different aquaculture footprints (e.g. England) rank salmon mariculture as a lower threat.


