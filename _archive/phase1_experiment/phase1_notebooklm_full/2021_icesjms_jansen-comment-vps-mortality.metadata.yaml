key_claims:
  - "VPS model systematically overestimates lice-induced mortality compared to trawl observations in 26 of 27 area-year comparisons"
  - "Overestimation is especially pronounced at low mortality levels"
  - "The conclusion by Johnsen et al. that modelled lice levels coincide with observed levels is contradicted"
  - "Even accounting for further infestation on remaining migration pathway, overestimation persists in 22 of 27 comparisons"

claims_about_uncertainty:
  - "Biases in sub-model parameterisation may propagate through the modelling system"
  - "Due to model complexity, the specific reasons for systematic overestimation cannot be identified"

claims_about_policy_or_management:
  - "VPS predictions have contributed to mandatory production reductions in management areas 4 and 5"
  - "The systematic overestimation has direct regulatory consequences"

methodological_limitations:
  - "Assumes trawled post-smolts originate from rivers draining into corresponding inner fjords"
  - "Uses average VPS mortality, which may not represent actual trawl catch composition"
  - "Does not identify which specific sub-model causes the overestimation"

rag_summary: >
  Validation analysis of the IMR virtual post-smolt (VPS) model used in the Norwegian Traffic Light
  System. Compared VPS predicted mortality against mortality estimated from 7,929 trawled post-smolts
  across 27 area-year comparisons (2017-2020). Found systematic overestimation: VPS mortality exceeded
  trawl-derived mortality in 26 of 27 comparisons (p=0.003). Overestimation persisted even after
  adjusting for remaining migration pathway. Contradicts the VPS model authors' claim that modelled and
  observed lice levels coincide. Directly relevant to TLS regulatory decisions.

