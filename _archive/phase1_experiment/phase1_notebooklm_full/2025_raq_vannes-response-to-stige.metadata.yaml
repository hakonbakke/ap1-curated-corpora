rag_summary: >
  Response by Van Nes, Imsland and Jones to the Expert Group's comment on their 2024 critical
  review. Defends key claims: acoustic telemetry migration data are not included in TLS estimates;
  calibration compensation fails if calibration data themselves are unreliable; 5 of 7 endpoints
  assume 100% lice survival. Notes that findings align with the independent evaluation committee
  and the EG's own reports. Rejects allegations of bias and undisclosed conflicts of interest.
