key_claims:
  - "Female salmon lice at high host density (mimicking aquaculture) exhibit greater pre-reproductive mortality, smaller adult body size, delayed maturation, and lower fecundity than lice at low host density (mimicking natural conditions)."
  - "Adult body size is a key integrative life-history trait: larger females reproduce earlier, have greater lifetime fecundity, and live longer."
  - "The most likely mechanism for reduced louse performance at high host density is stronger immune responses in hosts exposed to higher parasite doses, not direct competition among lice."
  - "Female L. salmonis on farmed salmon are ~19% smaller than those on wild salmon (consistent with prior field data); this study provides an experimental explanation for this size difference."
  - "The combination of high host density and strong within-host competition may be selecting for increased virulence in farm-origin lice, with potential adverse consequences for wild salmon."

claims_about_uncertainty:
  - "The experimental design cannot fully disentangle the contributions of host immune responses, host stress from crowding, and direct competition among lice."
  - "Results from hatchery-reared salmon held in 500L tanks may not fully represent immune responses or lice life histories in large open-net cages."

claims_about_policy_or_management:
  - "Drug-based control thresholds set on average lice abundances may not account for density-dependent effects on parasite virulence and fecundity."
  - "If aquaculture selects for more virulent lice (greater early investment in reproduction), spillover events to wild fish may cause disproportionate harm."

methodological_limitations:
  - "Experiment used post-smolt Atlantic salmon in small tanks; responses may not fully represent conditions in commercial open-net pens."
  - "Adult male lice could not be tagged due to small size and are excluded from analysis."
  - "Study reports on lice from three Norwegian locations; geographic variation in louse populations may affect generalisability."

rag_summary: >
  Folk et al. (2026) used individually tagged female salmon lice (L. salmonis) to compare parasite life histories under high host density (mimicking aquaculture conditions) and low host density (mimicking natural wild conditions) in a replicated laboratory experiment. Lice at high density showed reduced juvenile survival, smaller adult body size, delayed maturation, and lower fecundity — consistent with stronger immune responses in hosts exposed to higher parasite doses. Adult body size emerged as a key trait predicting reproductive success and lifespan. The results provide an experimental explanation for the observed smaller size of lice on farmed vs. wild salmon in field studies, and suggest that aquaculture environments may select for lice with faster, more virulent life histories. This has implications for the risk posed by farm-origin lice spilling over to wild salmonids.

