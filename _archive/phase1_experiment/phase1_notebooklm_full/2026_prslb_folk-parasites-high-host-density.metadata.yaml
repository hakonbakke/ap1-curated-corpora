# ======================================================================

included_because: >
  Provides novel experimental evidence that aquaculture conditions (high host density) alter louse life history in ways that may select for increased virulence. This adds a mechanistic dimension to the question of how salmon farming affects lice that infect wild fish: not only does farming increase lice abundance, but it may change louse biology in ways that amplify harm to wild salmon during spillover events.

